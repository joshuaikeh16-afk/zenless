<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AniGamble HQ — My Profile</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="stylesheet" href="css/premium.css">
  <style>
    /* Base floating orb settings */
    .hero-banner-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      mix-blend-mode: screen;
      pointer-events: none;
      opacity: 0.85;
      transform-origin: center;
    }

    .hero-banner-orb.orb-1 {
      width: 180px; height: 180px; top: -40px; left: -40px;
      background: radial-gradient(circle, rgba(139,92,246,0.35) 0%, transparent 70%);
      animation: fx-float-orb-slow 9s ease-in-out infinite alternate;
    }

    .hero-banner-orb.orb-2 {
      width: 120px; height: 120px; top: 10px; right: 60px;
      background: radial-gradient(circle, rgba(59,130,246,0.25) 0%, transparent 70%);
      animation: fx-float-orb-fast 7s ease-in-out infinite alternate-reverse;
    }

    @keyframes fx-float-orb-slow {
      0%   { transform: translate(0, 0) scale(1); filter: blur(40px); }
      50%  { transform: translate(15px, -10px) scale(1.1); filter: blur(35px); }
      100% { transform: translate(-10px, 15px) scale(0.95); filter: blur(45px); }
    }

    @keyframes fx-float-orb-fast {
      0%   { transform: translate(0, 0) scale(1); opacity: 0.7; }
      100% { transform: translate(-20px, -20px) scale(1.15); opacity: 0.9; filter: blur(30px); }
    }

    /* ── Profile Hero ─────────────────────────────────── */
    .profile-hero {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 1.25rem;
      position: relative;
    }

    .hero-banner {
      height: 120px;
      background: linear-gradient(135deg, #1a1040 0%, #2a1f5e 35%, #1b1060 60%, #0f1a35 100%);
      position: relative;
      overflow: hidden;
    }

    .hero-banner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.04) 50%, transparent 60%);
      background-size: 200% 100%;
      animation: bannerShimmer 4s ease-in-out infinite;
    }

    @keyframes bannerShimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .hero-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 60%, rgba(124,93,250,0.5) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 20%, rgba(167,139,250,0.28) 0%, transparent 45%),
        radial-gradient(ellipse at 90% 80%, rgba(91,138,245,0.2) 0%, transparent 40%);
    }

    .hero-banner-dots {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    .hero-banner-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(24px);
      pointer-events: none;
    }

    .hero-body {
      padding: 0 1.5rem 1.5rem;
      position: relative;
    }

    .hero-avatar-wrap {
      position: relative;
      display: inline-block;
      margin-top: -40px;
      margin-bottom: 0.75rem;
    }

    .hero-avatar-wrap .avatar,
    .hero-avatar-wrap img {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      border: 3px solid var(--bg-2);
      box-shadow: 0 0 0 1px var(--border-2), 0 4px 20px rgba(0,0,0,.5);
      object-fit: cover;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
    }

    .hero-online-dot {
      position: absolute;
      bottom: 5px; right: 5px;
      width: 14px; height: 14px;
      background: var(--success);
      border-radius: 50%;
      border: 2.5px solid var(--bg-2);
      box-shadow: 0 0 6px rgba(34,212,114,.6);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 6px rgba(34,212,114,.6); }
      50%       { box-shadow: 0 0 12px rgba(34,212,114,.9); }
    }

    .hero-name {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 5px;
    }

    .hero-meta {
      font-size: 12.5px;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .hero-meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color .15s;
    }

    .hero-bio {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 0.65rem;
      line-height: 1.55;
      padding: 0.6rem 0.85rem;
      background: var(--bg-3);
      border-left: 2px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    .hero-actions {
      position: absolute;
      top: 1.25rem;
      right: 1.5rem;
      display: flex;
      gap: 8px;
    }

    .sign-out-btn {
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--radius);
      padding: 0.38rem 0.9rem;
      font-size: 12px;
      color: rgba(255,255,255,.6);
      cursor: pointer;
      font-family: var(--font-body);
      backdrop-filter: blur(8px);
      transition: all 0.15s;
    }
    .sign-out-btn:hover { color: #fff; border-color: rgba(255,255,255,.3); background: rgba(255,255,255,.1); }

    /* ── Stats Ribbon ─────────────────────────────────── */
    .stats-ribbon {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.85rem;
      margin-bottom: 1.25rem;
    }

    .stat-pill {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 0.85rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: border-color .2s, transform .2s;
    }

    .stat-pill:hover { border-color: var(--border-2); transform: translateY(-2px); }

    .stat-pill::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      border-radius: 1px;
    }

    .stat-pill.gold-pill::before   { background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .stat-pill.purple-pill::before { background: linear-gradient(90deg, transparent, var(--pp-color), transparent); }
    .stat-pill.green-pill::before  { background: linear-gradient(90deg, transparent, var(--green), transparent); }
    .stat-pill.blue-pill::before   { background: linear-gradient(90deg, transparent, var(--accent-2), transparent); }

    .stat-pill-val {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 5px;
    }

    .stat-pill-label {
      font-size: 10.5px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .stat-pill-icon {
      font-size: 18px;
      margin-bottom: 4px;
      display: block;
    }

    @media(max-width:600px) {
      .stats-ribbon { grid-template-columns: repeat(2,1fr); }
    }

    /* ── Promo Banner ─────────────────────────────────── */
    .games-promo {
      background: linear-gradient(135deg, rgba(124,93,250,.14) 0%, rgba(91,138,245,.07) 100%);
      border: 1px solid rgba(124,93,250,.25);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
      position: relative;
      overflow: hidden;
    }

    .games-promo::before {
      content: '🎮';
      position: absolute;
      right: 5rem; top: 50%;
      transform: translateY(-50%);
      font-size: 64px;
      opacity: .06;
      pointer-events: none;
    }

    .promo-text  { font-size: 13px; color: var(--text-2); line-height: 1.5; }
    .promo-title { font-weight: 600; color: var(--text); margin-bottom: 2px; font-size: 14px; }

    .promo-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.55rem 1.2rem;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-display);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(124,93,250,.35);
      transition: opacity 0.15s, box-shadow .15s;
    }
    .promo-btn:hover { opacity: 0.88; box-shadow: 0 4px 18px rgba(124,93,250,.45); }

    /* ── Profile Grid ─────────────────────────────────── */
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    @media(max-width:700px) {
      .profile-grid { grid-template-columns: 1fr; }
    }

    .profile-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      position: relative;
      overflow: hidden;
      transition: border-color .2s;
    }

    .profile-card:hover { border-color: var(--border-2); }
    .profile-card.full-width { grid-column: 1 / -1; }

    .card-title {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.55px;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .profile-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
    }

    /* ── Balance ──────────────────────────────────────── */
    .balance-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .balance-item:last-child { border-bottom: none; }

    .balance-item-label {
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .balance-item-val {
      font-family: var(--font-display);
      font-weight: 600;
    }

    .balance-total .balance-item-val { color: var(--gold); font-size: 15px; }

    /* ── PP History ───────────────────────────────────── */
    .pp-history-list { display: flex; flex-direction: column; }

    .pp-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 12.5px;
      gap: 8px;
    }

    .pp-entry:last-child { border-bottom: none; }

    .pp-entry-label { color: var(--text-2); font-weight: 500; }
    .pp-entry-time  { font-size: 11px; color: var(--text-3); margin-top: 1px; }

    .pp-entry-pts {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
      padding: 2px 9px;
      border-radius: 20px;
    }

    .pp-entry-pts.gain { color: var(--pp-color); background: var(--pp-dim); }
    .pp-entry-pts.loss { color: var(--danger); background: var(--danger-dim); }

    /* ── Inventory ────────────────────────────────────── */
    .inv-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }

    .inv-item {
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 7px 9px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: border-color 0.15s, background .15s, transform .15s;
    }

    .inv-item:hover {
      border-color: var(--border-2);
      background: var(--bg-4);
      transform: translateY(-1px);
    }

    .inv-empty {
      font-size: 12px;
      color: var(--text-3);
      padding: 0.5rem 0;
    }

    /* ── Win rate bar ─────────────────────────────────── */
    .wr-bar-wrap {
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 99px;
      height: 9px;
      overflow: hidden;
      margin: 0.65rem 0 0.3rem;
    }

    .wr-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #7C5DFA, #a78bfa);
      transition: width 1.1s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 0 8px rgba(124,93,250,.5);
    }

    /* ── Rank badge ───────────────────────────────────── */
    .rank-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(212,167,23,0.12);
      border: 1px solid rgba(212,167,23,0.25);
      color: var(--gold);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 20px;
    }

    /* ── Skeleton ─────────────────────────────────────── */
    .skel {
      background: linear-gradient(90deg, var(--bg-3) 25%, var(--bg-4) 50%, var(--bg-3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
      height: 14px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── User Popup ───────────────────────────────────── */
    .user-popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 400;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: fadeIn .2s ease;
    }

    .user-popup-overlay.open { display: flex; }

    .user-popup {
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-xl, 20px);
      width: 100%;
      max-width: 480px;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04);
      animation: popupIn .25s cubic-bezier(0.22, 1, 0.36, 1);
      scrollbar-width: none;
    }
    .user-popup::-webkit-scrollbar { display: none; }

    @keyframes popupIn {
      from { opacity: 0; transform: scale(.94) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .popup-banner {
      height: 100px;
      border-radius: var(--radius-xl, 20px) var(--radius-xl, 20px) 0 0;
      position: relative;
      overflow: hidden;
    }

    .popup-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 60%, rgba(124,93,250,.55) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(167,139,250,.3) 0%, transparent 45%);
    }

    .popup-banner-dots {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,.07) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .popup-close {
      position: absolute;
      top: 12px; right: 12px;
      width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(0,0,0,.45);
      border: 1px solid rgba(255,255,255,.15);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      transition: background .15s;
      line-height: 1;
      z-index: 2;
    }
    .popup-close:hover { background: rgba(255,255,255,.15); }

    .popup-body { padding: 0 1.35rem 1.5rem; }

    .popup-avatar-wrap {
      position: relative;
      display: inline-block;
      margin-top: -38px;
      margin-bottom: 0.65rem;
    }

    .popup-avatar-wrap .avatar,
    .popup-avatar-wrap img {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 3px solid var(--bg-2);
      box-shadow: 0 0 0 1px var(--border-2), 0 4px 16px rgba(0,0,0,.5);
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      object-fit: cover;
    }

    .popup-name {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .popup-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 0.1rem;
    }

    .popup-meta-item { display: flex; align-items: center; gap: 4px; }

    .popup-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin: 1rem 0;
    }

    .popup-stat-cell {
      background: var(--bg-3);
      padding: .8rem .5rem;
      text-align: center;
    }

    .popup-stat-val {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .popup-stat-lbl {
      font-size: 10px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 600;
    }

    .popup-section { margin-bottom: 1rem; }
    .popup-section:last-child { margin-bottom: 0; }

    .popup-section-title {
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-3);
      margin-bottom: .6rem;
    }

    .popup-chips { display: flex; flex-wrap: wrap; gap: 6px; }

    .popup-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text-2);
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }

    .popup-chip:hover { border-color: var(--border-2); background: var(--bg-4); color: var(--text); }

    .popup-empty { font-size: 12px; color: var(--text-3); padding: 3px 0; }

    .popup-footer {
      font-size: 11.5px;
      color: var(--text-3);
      border-top: 1px solid var(--border);
      padding-top: .85rem;
      margin-top: 1rem;
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    /* ── Misc ─────────────────────────────────────────── */
    .gold   { color: var(--gold); }
    .purple { color: var(--pp-color); }
    .green  { color: var(--green); }
    .blue   { color: var(--accent-2); }
    .danger { color: var(--danger); }

    .role-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
    }

  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" style="max-width:860px;">

    <!-- Loading state -->
    <div id="loading-state">
      <div class="profile-hero" style="margin-bottom:1.25rem;">
        <div class="hero-banner"><div class="hero-banner-dots"></div></div>
        <div class="hero-body" style="padding-top:.75rem;">
          <div class="skel" style="width:78px;height:78px;border-radius:50%;margin-top:-40px;margin-bottom:.75rem;"></div>
          <div class="skel" style="width:200px;height:20px;margin-bottom:8px;"></div>
          <div class="skel" style="width:140px;height:12px;"></div>
        </div>
      </div>
    </div>

    <!-- Profile content (filled by JS) -->
    <div id="profile-content" style="display:none;"></div>

    <!-- Not found -->
    <div id="not-found" style="display:none;" class="card fade-in">
      <div style="text-align:center;padding:3rem 1rem;">
        <div style="font-size:48px;margin-bottom:1rem;">🔍</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:.5rem;">Profile not found</div>
        <div style="font-size:13px;color:var(--text-3);margin-bottom:1.5rem;">Your session may have expired.</div>
        <a href="member-login.html" class="promo-btn">Log in again</a>
      </div>
    </div>

  </main>
</div>

<!-- User Popup -->
<div class="user-popup-overlay" id="user-popup-overlay" onclick="closeUserPopup(event)">
  <div class="user-popup" id="user-popup-inner"></div>
</div>

<script src="data/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/profile.js"></script>
<script>
  let currentUser = null;

  /* ── Profile Renderer ────────────────────────────────── */
  function renderProfile(user) {
    const ppHistory = user.ppHistory || [];

    const wins    = ppHistory.filter(h => h.amount > 0).length;
    const games   = ppHistory.length;
    const losses  = games - wins;
    const winRate = games > 0 ? Math.round((wins / games) * 100) : 0;
    const ppPoints = user.primePoints || 0;

    const recentPP = ppHistory.slice(0, 8).map(h => {
      const d = h.timestamp ? new Date(h.timestamp) : null;
      const timeStr = d && !isNaN(d) ? App.timeAgo(d) : '';
      return `
        <div class="pp-entry">
          <div>
            <div class="pp-entry-label">${h.reason || 'PP Update'}</div>
            <div class="pp-entry-time">${timeStr}</div>
          </div>
          <div class="pp-entry-pts ${h.amount > 0 ? 'gain' : 'loss'}">${h.amount > 0 ? '+' : ''}${h.amount} ◈</div>
        </div>`;
    }).join('') || '<div class="inv-empty">No activity yet — play a game! 🎮</div>';

    const cardItems = user.cards.length
      ? user.cards.map(c => {
          const card = typeof c === 'object' ? c : { name: c };
          const tierColor = { C:'#9ca3af', R:'#3b82f6', SR:'#a855f7', SSR:'#f59e0b', UR:'#ef4444' }[card.tier] || '#9ca3af';
          const safeJson  = JSON.stringify(JSON.stringify(card));
          return `
            <div class="inv-item" onclick="openCardModal(${safeJson})"
              style="cursor:pointer;"
              onmouseover="this.style.borderColor='${tierColor}'"
              onmouseout="this.style.borderColor=''">
              ${card.preRenderedUrl
                ? `<img src="${card.preRenderedUrl}" style="width:30px;height:42px;object-fit:cover;border-radius:4px;flex-shrink:0;">`
                : `<span style="font-size:18px;">🃏</span>`
              }
              <div style="min-width:0;flex:1;">
                <div style="font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${card.name || 'Unknown'}</div>
                <div style="font-size:10px;color:${tierColor};font-weight:600;">${card.badge || card.tier || ''}</div>
              </div>
              <span style="font-size:11px;color:var(--text-3);">›</span>
            </div>`;
        }).join('')
      : '<div class="inv-empty">No cards yet</div>';

    const souvItems = user.souvenirs.length
      ? user.souvenirs.map(s => `<div class="inv-item"><span>🎁</span><span>${s.name || s}</span></div>`).join('')
      : '<div class="inv-empty">No souvenirs yet</div>';

    const guildBadge = user.guild ? `<div class="hero-meta-item">⚔️ ${user.guild}</div>` : '';
    const joinDate   = user.joinedAt ? timeAgoFull(user.joinedAt) : null;
    const roleBadge  = user.role ? App.roleBadge(user.role) : '';

    return `
      <!-- Hero -->
      <div class="profile-hero fade-in">
        <div class="hero-banner" style="height:120px;">
          <div class="hero-banner-dots"></div>
          <div class="hero-banner-orb orb-1"></div>
          <div class="hero-banner-orb orb-2"></div>
        </div>
        <div class="hero-body">
          <div class="hero-actions">
            <button class="sign-out-btn" onclick="memberLogout()">Sign out</button>
          </div>
          <div class="hero-avatar-wrap">
            ${App.renderAvatar(user, 78)}
            <div class="hero-online-dot" title="Online now"></div>
          </div>
          <div class="hero-name">${user.name} ${roleBadge}</div>
          <div class="hero-meta">
            <div class="hero-meta-item">📱 ${user.phone || user.id}</div>
            ${guildBadge}
            ${joinDate ? `<div class="hero-meta-item">📅 Joined ${joinDate}</div>` : ''}
          </div>
          ${user.bio ? `<div class="hero-bio">${user.bio}</div>` : ''}
        </div>
      </div>

      <!-- Stats ribbon -->
      <div class="stats-ribbon fade-in">
        <div class="stat-pill gold-pill">
          <span class="stat-pill-icon">🪙</span>
          <div class="stat-pill-val gold">${App.formatCoins(user.netWorth)}</div>
          <div class="stat-pill-label">Net Worth</div>
        </div>
        <div class="stat-pill purple-pill">
          <span class="stat-pill-icon">◈</span>
          <div class="stat-pill-val purple">${ppPoints.toLocaleString()}</div>
          <div class="stat-pill-label">Prime Points</div>
        </div>
        <div class="stat-pill blue-pill">
          <span class="stat-pill-icon">🃏</span>
          <div class="stat-pill-val blue">${user.cards.length}</div>
          <div class="stat-pill-label">Cards</div>
        </div>
        <div class="stat-pill green-pill">
          <span class="stat-pill-icon">🏆</span>
          <div class="stat-pill-val green">${winRate}%</div>
          <div class="stat-pill-label">Win Rate</div>
        </div>
      </div>

      <!-- Games promo -->
      <div class="games-promo fade-in">
        <div>
          <div class="promo-title">Ready to play?</div>
          <div class="promo-text">Bet Prime Points, earn more, and climb the leaderboard.</div>
        </div>
        <a href="games.html" class="promo-btn">Open Games →</a>
      </div>

      <!-- Grid -->
      <div class="profile-grid">

        <!-- Wallet card -->
        <div class="profile-card fade-in">
          <div class="card-title">💰 Wallet</div>
          <div class="balance-item">
            <div class="balance-item-label">🪙 Prime Coins</div>
            <div class="balance-item-val gold">${App.formatCoins(user.coins)}</div>
          </div>
          <div class="balance-item">
            <div class="balance-item-label">🏦 Bank</div>
            <div class="balance-item-val">${App.formatCoins(user.bank)}</div>
          </div>
          <div class="balance-item balance-total">
            <div class="balance-item-label"><strong>Net Worth</strong></div>
            <div class="balance-item-val">${App.formatCoins(user.netWorth)}</div>
          </div>

          <div style="margin-top:1.25rem;">
            <div class="card-title">◈ Prime Points</div>
            <div class="balance-item">
              <div class="balance-item-label">Balance</div>
              <div class="balance-item-val purple">◈ ${ppPoints.toLocaleString()}</div>
            </div>
            <div class="balance-item">
              <div class="balance-item-label">Total games</div>
              <div class="balance-item-val">🎮 ${games}</div>
            </div>
            <div class="balance-item">
              <div class="balance-item-label">Record</div>
              <div class="balance-item-val">${wins}W / ${losses}L</div>
            </div>
            <button id="claim-pp-btn" class="promo-btn" style="width:100%;justify-content:center;margin-top:0.85rem;" onclick="handleClaimPP()">
              <span id="claim-pp-label">🎁 Claim Daily PP</span>
            </button>
          </div>
        </div>

        <!-- Game stats card -->
        <div class="profile-card fade-in">
          <div class="card-title">🎮 Game Stats</div>
          <div class="balance-item">
            <div class="balance-item-label">Games played</div>
            <div class="balance-item-val">${games}</div>
          </div>
          <div class="balance-item">
            <div class="balance-item-label">Wins</div>
            <div class="balance-item-val green">${wins}</div>
          </div>
          <div class="balance-item">
            <div class="balance-item-label">Losses</div>
            <div class="balance-item-val danger">${losses}</div>
          </div>
          <div class="balance-item">
            <div class="balance-item-label">Win rate</div>
            <div class="balance-item-val">${winRate}%</div>
          </div>
          <div class="wr-bar-wrap">
            <div class="wr-bar-fill" id="wr-bar" style="width:0%"></div>
          </div>
          <div style="font-size:11px;color:var(--text-3);display:flex;justify-content:space-between;">
            <span>0%</span><span>${winRate}% win rate</span><span>100%</span>
          </div>

          <!-- Link to deck page -->
          <div style="margin-top:1.25rem;">
            <div class="card-title">🎴 Deck</div>
            <div style="font-size:12.5px;color:var(--text-3);margin-bottom:.75rem;">Manage your 9-card deck showcase.</div>
            <a href="deck.html" class="promo-btn" style="width:100%;justify-content:center;">
              Open My Deck →
            </a>
          </div>
        </div>

        <!-- PP Activity -->
        <div class="profile-card fade-in">
          <div class="card-title">📋 Recent PP Activity</div>
          <div class="pp-history-list">${recentPP}</div>
        </div>

        <!-- Cards & Souvenirs -->
        <div class="profile-card fade-in">
          <div class="card-title">🃏 Cards (${user.cards.length})</div>
          <div class="inv-grid">${cardItems}</div>
          ${user.souvenirs.length > 0 ? `
          <div class="card-title" style="margin-top:1.25rem;">🎁 Souvenirs (${user.souvenirs.length})</div>
          <div class="inv-grid">${souvItems}</div>` : ''}
        </div>

      </div>
    `;
  }

  async function loadMyProfile() {
    const phone = sessionStorage.getItem('agi_member_phone');
    if (!phone) { window.location.href = 'member-login.html'; return; }

    const raw  = await API.getUserByPhone(phone);
    const user = App.parseUser(raw?.[0]);

    document.getElementById('loading-state').style.display = 'none';

    if (!user) {
      document.getElementById('not-found').style.display = 'block';
      return;
    }

    currentUser = user;

    const content = document.getElementById('profile-content');
    content.style.display = 'block';
    content.innerHTML = renderProfile(user);

    // Claim button state
    const status = PPApi.getClaimStatus(user._raw);
    setClaimButtonState(status);

    requestAnimationFrame(() => {
      const games   = user.ppHistory.length;
      const wins    = user.ppHistory.filter(h => h.amount > 0).length;
      const winRate = games > 0 ? Math.round((wins / games) * 100) : 0;
      setTimeout(() => {
        const bar = document.getElementById('wr-bar');
        if (bar) bar.style.width = winRate + '%';
      }, 120);
    });

    document.title = `${user.name} — AniGamble HQ`;
  }

  function formatMsRemaining(ms) {
    const totalMin = Math.max(0, Math.ceil(ms / 60000));
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return h > 0 ? `${h}h ${m}m` : `${m}m`;
  }

  function setClaimButtonState(status) {
    const btn   = document.getElementById('claim-pp-btn');
    const label = document.getElementById('claim-pp-label');
    if (!btn || !label || !status) return;

    if (status.canClaim) {
      btn.disabled = false;
      btn.style.opacity = '';
      label.textContent = '🎁 Claim Daily PP';
    } else {
      btn.disabled = true;
      btn.style.opacity = '0.55';
      label.textContent = `⏳ Next claim in ${formatMsRemaining(status.msRemaining)}`;
    }
  }

  async function handleClaimPP() {
    const phone = sessionStorage.getItem('agi_member_phone');
    const btn   = document.getElementById('claim-pp-btn');
    const label = document.getElementById('claim-pp-label');
    if (!phone || !btn) return;

    btn.disabled = true;
    label.textContent = 'Claiming...';

    const rows = await API.getUserByPhone(phone);
    const row  = rows?.[0];
    if (!row) {
      App.showToast("Couldn't reach the server — try again.", 'error');
      label.textContent = '🎁 Claim Daily PP';
      btn.disabled = false;
      return;
    }

    const data   = typeof row.data === 'string' ? JSON.parse(row.data) : (row.data || {});
    const result = await PPApi.claimDailyPP(row.id, data);

    if (result.claimed) {
      App.showToast(`+${result.amount} Prime Points claimed! 🎉`, 'success');
      loadMyProfile();
    } else {
      App.showToast(`Already claimed today — back in ${formatMsRemaining(result.msRemaining)}`, 'info');
      setClaimButtonState({ canClaim: false, msRemaining: result.msRemaining });
    }
  }

  /* ── Auth & helpers ────────────────────────────────── */
  function memberLogout() {
    sessionStorage.removeItem('agi_member_phone');
    sessionStorage.removeItem('agi_member_name');
    window.location.href = 'member-login.html';
  }

  function timeAgoFull(ts) {
    if (!ts) return '—';
    const d = typeof ts === 'number' ? new Date(ts) : new Date(ts);
    if (isNaN(d)) return '—';
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  /* ── User Popup ────────────────────────────────────── */
  function openUserPopup(user) {
    const overlay = document.getElementById('user-popup-overlay');
    const inner   = document.getElementById('user-popup-inner');

    const cardChips = user.cards && user.cards.length
      ? user.cards.map(c => {
          const name = c.name || c;
          const safeJson = JSON.stringify(JSON.stringify(c));
          return `<div class="popup-chip" onclick="openCardModal(${safeJson})">🃏 ${name}</div>`;
        }).join('')
      : '<div class="popup-empty">No cards yet</div>';

    const souvChips = user.souvenirs && user.souvenirs.length
      ? user.souvenirs.map(s => `<div class="popup-chip">🎁 ${s.name || s}</div>`).join('')
      : '<div class="popup-empty">No souvenirs yet</div>';

    const bannerBg = user.avatarColor
      ? `linear-gradient(135deg, ${user.avatarColor}33 0%, #0f1a35 100%)`
      : 'linear-gradient(135deg, #1a1040 0%, #2a1f5e 40%, #0f1a35 100%)';

    inner.innerHTML = `
      <div class="popup-banner" style="background:${bannerBg};">
        <div class="popup-banner-dots"></div>
        <button class="popup-close" onclick="closeUserPopup()">✕</button>
      </div>
      <div class="popup-body">
        <div class="popup-avatar-wrap">${App.renderAvatar(user, 72)}</div>
        <div class="popup-name">${user.name} ${App.roleBadge(user.role)}</div>
        <div class="popup-meta">
          <div class="popup-meta-item">📱 ${user.phone || user.id}</div>
          ${user.guild ? `<div class="popup-meta-item">⚔️ ${user.guild}</div>` : ''}
          ${user.joinedAt ? `<div class="popup-meta-item">📅 ${timeAgoFull(user.joinedAt)}</div>` : ''}
        </div>
        ${user.bio ? `<div class="hero-bio" style="margin-top:.65rem;">${user.bio}</div>` : ''}
        <div class="popup-stats">
          <div class="popup-stat-cell">
            <div class="popup-stat-val gold">🪙 ${App.formatCoins(user.netWorth)}</div>
            <div class="popup-stat-lbl">Net Worth</div>
          </div>
          <div class="popup-stat-cell">
            <div class="popup-stat-val" style="color:var(--green)">${App.formatCoins(user.coins)}</div>
            <div class="popup-stat-lbl">Wallet</div>
          </div>
          <div class="popup-stat-cell">
            <div class="popup-stat-val" style="color:var(--accent)">${App.formatCoins(user.bank || 0)}</div>
            <div class="popup-stat-lbl">Bank</div>
          </div>
        </div>
        <div class="popup-section">
          <div class="popup-section-title">Cards · ${(user.cards || []).length}</div>
          <div class="popup-chips">${cardChips}</div>
        </div>
        <div class="popup-section">
          <div class="popup-section-title">Souvenirs · ${(user.souvenirs || []).length}</div>
          <div class="popup-chips">${souvChips}</div>
        </div>
        <div class="popup-footer">
          ${user.joinedAt ? `<span>Joined ${App.timeAgo(user.joinedAt)}</span>` : ''}
          ${user.updatedAt ? `<span>Last active ${App.timeAgo(user.updatedAt)}</span>` : ''}
          ${user.rank ? `<span>Rank: <strong style="color:var(--text-2)">${user.rank}</strong></span>` : ''}
        </div>
      </div>
    `;

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeUserPopup(e) {
    if (e && e.target !== document.getElementById('user-popup-overlay')) return;
    const overlay = document.getElementById('user-popup-overlay');
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      const overlay = document.getElementById('user-popup-overlay');
      if (overlay.classList.contains('open')) closeUserPopup({ target: overlay });
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    renderSidebar('profile');
    loadMyProfile();
  });
</script>
</body>
</html>
