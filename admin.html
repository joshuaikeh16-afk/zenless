<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AniGamble HQ — Admin</title>
<link rel="stylesheet" href="css/style.css"/>
<link rel="stylesheet" href="css/animations.css"/>
<link rel="stylesheet" href="css/premium.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root {
    --gold: #f5b942;
    --gold-dim: rgba(245,185,66,0.12);
    --deduct: #e84f6b;
    --deduct-dim: rgba(232,79,107,0.12);
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    background:
      radial-gradient(ellipse 900px 600px at 10% -10%, rgba(124,93,250,0.13), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 0%, rgba(245,185,66,0.08), transparent 55%),
      radial-gradient(ellipse 600px 500px at 50% 100%, rgba(232,79,107,0.05), transparent 55%),
      var(--bg);
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.008) 2px, rgba(255,255,255,0.008) 4px);
    pointer-events: none;
    z-index: 0;
  }
  .admin-login-wrap, .admin-shell { position: relative; z-index: 1; }

  /* ── Login gate ─────────────────────────────────────── */
  .admin-login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .admin-login-card {
    width: 100%;
    max-width: 360px;
    background: linear-gradient(160deg, var(--bg-2) 0%, color-mix(in srgb, var(--bg-2) 85%, var(--accent) 6%) 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.25rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .admin-login-card::before {
    content: '';
    position: absolute;
    top: -60%; left: -20%;
    width: 140%; height: 140%;
    background: radial-gradient(ellipse, rgba(124,93,250,0.18), transparent 60%);
    pointer-events: none;
  }
  .admin-login-icon {
    font-size: 34px;
    margin-bottom: 0.6rem;
    position: relative;
    filter: drop-shadow(0 4px 16px rgba(124,93,250,0.5));
  }
  .admin-login-title {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.3rem;
    position: relative;
    letter-spacing: -0.2px;
  }
  .admin-login-sub {
    font-size: 12px;
    color: var(--text-2);
    margin-bottom: 1.75rem;
    position: relative;
    font-family: var(--mono);
    letter-spacing: 0.4px;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .admin-login-input {
    width: 100%;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 0.85rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    position: relative;
    font-family: var(--mono);
  }
  .admin-login-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
  }
  .admin-login-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 70%, #fff 10%));
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0.8rem;
    font-size: 14px;
    font-weight: 700;
    font-family: var(--font-body);
    letter-spacing: 0.2px;
    transition: filter .15s, transform .12s;
    position: relative;
    box-shadow: 0 8px 24px -8px color-mix(in srgb, var(--accent) 60%, transparent);
  }
  .admin-login-btn:hover { filter: brightness(1.1); }
  .admin-login-btn:active { transform: scale(0.97); }
  .admin-login-error { color: var(--deduct); font-size: 12.5px; margin-top: 0.7rem; min-height: 16px; position: relative; font-family: var(--mono); }

  /* ── Admin shell ────────────────────────────────────── */
  .admin-shell { display: none; max-width: 1040px; margin: 0 auto; padding: 1.75rem 1.5rem; }
  .admin-header { margin-bottom: 2rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .admin-title {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 14px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--text) 30%, color-mix(in srgb, var(--accent) 60%, var(--text) 40%));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .admin-title-icon {
    width: 44px; height: 44px;
    border-radius: 13px;
    background: linear-gradient(145deg, color-mix(in srgb, var(--accent) 24%, transparent), color-mix(in srgb, var(--accent) 8%, transparent));
    border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
    display: flex; align-items: center; justify-content: center;
    font-size: 21px;
    flex-shrink: 0;
    box-shadow: 0 8px 24px -10px color-mix(in srgb, var(--accent) 50%, transparent), inset 0 1px 0 rgba(255,255,255,0.06);
    -webkit-text-fill-color: initial;
  }
  .live-pulse {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px 7px 11px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-2);
    letter-spacing: 0.4px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 0 0 color-mix(in srgb, var(--gold) 60%, transparent);
    animation: livePulse 2s ease-out infinite;
  }
  @keyframes livePulse {
    0%   { box-shadow: 0 0 0 0 color-mix(in srgb, var(--gold) 55%, transparent); }
    70%  { box-shadow: 0 0 0 6px color-mix(in srgb, var(--gold) 0%, transparent); }
    100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--gold) 0%, transparent); }
  }
  .admin-sub {
    font-size: 12.5px;
    color: var(--text-3);
    margin-top: 6px;
    font-family: var(--mono);
    letter-spacing: 0.3px;
  }
  .admin-sub::before { content: '$ '; color: var(--accent); }

  .admin-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }
  @media (max-width: 760px) { .admin-grid { grid-template-columns: 1fr; } }

  .admin-grid .admin-card:nth-child(1) { animation-delay: 0.05s; }
  .admin-grid .admin-card:nth-child(2) { animation-delay: 0.12s; }
  .admin-grid .admin-card:nth-child(3) { animation-delay: 0.19s; }

  .admin-card {
    background: linear-gradient(165deg, var(--bg-2) 0%, color-mix(in srgb, var(--bg-2) 92%, #000 4%) 100%);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
    transition: border-color .2s, transform .2s, box-shadow .2s;
  }
  .admin-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent) 40%, transparent), transparent);
  }
  .admin-card:hover {
    border-color: var(--border-2);
    transform: translateY(-2px);
    box-shadow: 0 16px 40px -20px rgba(0,0,0,0.5);
  }

  .admin-card-title {
    font-family: var(--font-display);
    font-size: 13.5px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 1.15rem;
    display: flex;
    align-items: center;
    gap: 8px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .admin-card-title .icon-chip {
    width: 26px; height: 26px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
  }

  .field-label {
    font-size: 10.5px;
    color: var(--text-3);
    margin-bottom: 6px;
    display: block;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.7px;
  }
  .field-input {
    width: 100%;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: 10px;
    padding: 0.65rem 0.85rem;
    color: var(--text);
    font-size: 13.5px;
    margin-bottom: 0.95rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    font-family: var(--mono);
  }
  .field-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
  }
  .field-input::placeholder { color: var(--text-3); opacity: 0.6; }

  .pp-amount-row { display: flex; gap: 8px; margin-bottom: 0.95rem; }
  .pp-amount-row .field-input { margin-bottom: 0; flex: 1; }

  .toggle-row { display: flex; gap: 8px; margin-bottom: 0.95rem; }
  .toggle-btn {
    flex: 1;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: 10px;
    padding: 0.6rem;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-2);
    font-family: var(--font-body);
    transition: all .18s;
    letter-spacing: 0.2px;
  }
  .toggle-btn:hover:not(.active) { border-color: var(--text-3); color: var(--text); }
  .toggle-btn:active { transform: scale(0.96); }
  .toggle-btn.active.grant {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 16px -4px color-mix(in srgb, var(--gold) 50%, transparent);
  }
  .toggle-btn.active.deduct {
    background: var(--deduct-dim);
    border-color: var(--deduct);
    color: var(--deduct);
    box-shadow: 0 0 16px -4px color-mix(in srgb, var(--deduct) 50%, transparent);
  }

  .admin-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 70%, #fff 8%));
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0.75rem;
    font-size: 13.5px;
    font-weight: 700;
    font-family: var(--font-body);
    letter-spacing: 0.3px;
    transition: filter .15s, transform .12s;
    box-shadow: 0 8px 20px -8px color-mix(in srgb, var(--accent) 55%, transparent);
    position: relative;
    overflow: hidden;
  }
  .admin-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    transition: left .5s ease;
  }
  .admin-btn:hover:not(:disabled)::before { left: 130%; }
  .admin-btn:hover:not(:disabled) { filter: brightness(1.1); }
  .admin-btn:active:not(:disabled) { transform: scale(0.97); }
  .admin-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

  .admin-result {
    font-size: 12px;
    margin-top: 0.85rem;
    min-height: 16px;
    font-family: var(--mono);
  }
  .admin-result.ok { color: var(--gold); }
  .admin-result.err { color: var(--deduct); }

  /* ── Ledger-style history feed ───────────────────────── */
  .pp-history-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 0.5rem;
    border-radius: 8px;
    font-size: 12px;
    font-family: var(--mono);
    transition: background .15s;
  }
  .pp-history-row:nth-child(odd) { background: color-mix(in srgb, var(--bg-3) 60%, transparent); }
  .pp-history-row:hover { background: var(--bg-3); }
  .pp-history-reason { color: var(--text); font-weight: 500; }
  .pp-history-time { color: var(--text-3); font-size: 10.5px; margin-top: 2px; letter-spacing: 0.2px; }
  .pp-history-amt {
    font-weight: 700;
    font-size: 13px;
    white-space: nowrap;
    padding-left: 12px;
  }
  .pp-history-amt.gain { color: var(--gold); }
  .pp-history-amt.loss { color: var(--deduct); }
  .pp-history-empty {
    color: var(--text-3);
    font-size: 12px;
    text-align: center;
    padding: 2rem 0;
    font-family: var(--mono);
  }
  .pp-history-empty::before { content: '◈ '; }

  #lookup-balance {
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: 10px;
    padding: 0.7rem 0.9rem;
    font-family: var(--mono);
  }

  /* ── Cashout Requests ─────────────────────────────────── */
  .cashout-alert {
    background: var(--gold-dim);
    border: 1px solid var(--gold);
    border-radius: 10px;
    padding: 0.7rem 0.95rem;
    font-size: 12.5px;
    color: var(--gold);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    box-shadow: 0 0 20px -6px color-mix(in srgb, var(--gold) 40%, transparent);
  }
  .cashout-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.65rem 0.5rem;
    border-radius: 8px;
    font-size: 12.5px;
    transition: background .15s;
  }
  .cashout-row:nth-child(odd) { background: color-mix(in srgb, var(--bg-3) 60%, transparent); }
  .cashout-row:hover { background: var(--bg-3); }
  .cashout-status {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.4px;
    font-family: var(--mono);
  }
  .cashout-status.pending { background: var(--gold-dim); color: var(--gold); }
  .cashout-status.approved { background: color-mix(in srgb, var(--gold) 15%, transparent); color: var(--gold); }
  .cashout-status.rejected { background: var(--deduct-dim); color: var(--deduct); }

  .full-span { grid-column: 1 / -1; }
</style>
</head>
<body>

<!-- ── Login Gate ─────────────────────────────────────── -->
<div class="admin-login-wrap" id="login-wrap">
  <div class="admin-login-card fade-in">
    <div class="admin-login-icon">🔐</div>
    <div class="admin-login-title">Admin Access</div>
    <div class="admin-login-sub">AniGamble HQ control panel</div>
    <input type="password" class="admin-login-input" id="admin-pw" placeholder="Admin password" autocomplete="off"/>
    <button class="admin-login-btn" onclick="tryLogin()">Sign in</button>
    <div class="admin-login-error" id="login-error"></div>
  </div>
</div>

<!-- ── Admin Shell ────────────────────────────────────── -->
<div class="admin-shell" id="admin-shell">
  <div class="admin-header fade-in">
    <div>
      <div class="admin-title"><span class="admin-title-icon">🛠️</span> Admin Panel</div>
      <div class="admin-sub">Manage Prime Points and monitor cashout requests</div>
    </div>
    <div class="live-pulse"><span class="live-dot"></span> System online</div>
  </div>

  <div class="admin-grid">

    <!-- Grant / Deduct PP -->
    <div class="admin-card fade-in">
      <div class="admin-card-title"><span class="icon-chip">◈</span> Grant / Deduct Prime Points</div>

      <label class="field-label">Phone number</label>
      <input type="text" class="field-input" id="pp-phone" placeholder="e.g. 2348012345678"/>

      <div class="toggle-row">
        <button class="toggle-btn active grant" id="btn-grant" onclick="setMode('grant')">+ Grant</button>
        <button class="toggle-btn deduct" id="btn-deduct" onclick="setMode('deduct')">− Deduct</button>
      </div>

      <label class="field-label">Amount</label>
      <input type="number" class="field-input" id="pp-amount" placeholder="0" min="1"/>

      <label class="field-label">Reason</label>
      <input type="text" class="field-input" id="pp-reason" placeholder="e.g. Tournament prize"/>

      <button class="admin-btn" id="pp-submit" onclick="submitPP()">Apply</button>
      <div class="admin-result" id="pp-result"></div>
    </div>

    <!-- PP History Lookup -->
    <div class="admin-card fade-in">
      <div class="admin-card-title"><span class="icon-chip">📋</span> Lookup PP History</div>

      <label class="field-label">Phone number</label>
      <input type="text" class="field-input" id="lookup-phone" placeholder="e.g. 2348012345678"/>

      <button class="admin-btn" onclick="lookupHistory()">View history</button>
      <div class="admin-result" id="lookup-result"></div>

      <div id="lookup-balance" style="margin-top:1rem;font-size:13px;color:var(--text-2);"></div>
      <div id="history-list" style="margin-top:0.5rem;max-height:280px;overflow-y:auto;"></div>
    </div>

    <!-- Cashout Requests -->
    <div class="admin-card fade-in full-span">
      <div class="admin-card-title"><span class="icon-chip">💸</span> Cashout Requests</div>
      <div id="cashout-alerts"></div>
      <div id="cashout-list"></div>
    </div>

  </div>
</div>

<script src="data/config.js"></script>
<script src="js/api.js"></script>
<script>
  // Guard: if config.js or api.js failed to load (wrong path, 404), surface it instead of dying silently
  if (typeof CONFIG === 'undefined' || typeof MongoAPI === 'undefined') {
    document.body.innerHTML = '<div style="padding:3rem;text-align:center;font-family:monospace;color:#e84f6b;">' +
      '⚠ Failed to load config.js or api.js — check the script paths at the bottom of admin.html match your real folder structure.' +
      '</div>';
    throw new Error('CONFIG or MongoAPI not loaded — aborting admin.html script');
  }

  let mode = 'grant';

  /* ── Login ────────────────────────────────────────── */
  function tryLogin() {
    const pw = document.getElementById('admin-pw').value;
    if (pw === CONFIG.admin.password) {
      sessionStorage.setItem(CONFIG.admin.sessionKey, '1');
      showAdmin();
    } else {
      document.getElementById('login-error').textContent = 'Incorrect password.';
    }
  }

  document.getElementById('admin-pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
  });

  function showAdmin() {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('admin-shell').style.display = 'block';
    loadCashouts();
  }

  /* ── PP Grant/Deduct ──────────────────────────────── */
  function setMode(m) {
    mode = m;
    document.getElementById('btn-grant').classList.toggle('active', m === 'grant');
    document.getElementById('btn-deduct').classList.toggle('active', m === 'deduct');
  }

  async function submitPP() {
    const phone  = document.getElementById('pp-phone').value.trim();
    const amtRaw = document.getElementById('pp-amount').value;
    const reason = document.getElementById('pp-reason').value.trim();
    const resultEl = document.getElementById('pp-result');
    const btn = document.getElementById('pp-submit');

    resultEl.textContent = '';
    resultEl.className = 'admin-result';

    if (!phone) { resultEl.textContent = 'Phone number is required.'; resultEl.classList.add('err'); return; }
    const amt = Number(amtRaw);
    if (!amt || amt <= 0) { resultEl.textContent = 'Enter a valid amount greater than 0.'; resultEl.classList.add('err'); return; }

    const signedAmount = mode === 'deduct' ? -amt : amt;

    btn.disabled = true;
    btn.textContent = 'Applying…';

    // Ensure the user exists in Mongo before granting (covers first-time PP for existing members)
    await MongoAPI.ensureUser(phone);
    const res = await MongoAPI.grantPP(phone, signedAmount, reason || (mode === 'grant' ? 'Admin grant' : 'Admin deduction'), 'admin');

    btn.disabled = false;
    btn.textContent = 'Apply';

    if (!res) {
      resultEl.textContent = 'Failed to update — check the API is running and the phone number exists.';
      resultEl.classList.add('err');
      return;
    }

    resultEl.textContent = `Done — ${phone} now has ${res.user.prime_points.toLocaleString()} PP (${res.user.rank}).`;
    resultEl.classList.add('ok');
    document.getElementById('pp-amount').value = '';
    document.getElementById('pp-reason').value = '';
  }

  /* ── PP History Lookup ───────────────────────────── */
  async function lookupHistory() {
    const phone = document.getElementById('lookup-phone').value.trim();
    const resultEl = document.getElementById('lookup-result');
    const balanceEl = document.getElementById('lookup-balance');
    const listEl = document.getElementById('history-list');

    resultEl.textContent = '';
    resultEl.className = 'admin-result';
    balanceEl.innerHTML = '';
    listEl.innerHTML = '';

    if (!phone) { resultEl.textContent = 'Enter a phone number.'; resultEl.classList.add('err'); return; }

    const user = await MongoAPI.getUser(phone);
    if (!user) {
      resultEl.textContent = 'No PP profile found for that number.';
      resultEl.classList.add('err');
      return;
    }

    balanceEl.innerHTML = `<strong style="color:var(--text)">◈ ${user.prime_points.toLocaleString()}</strong> · ${user.rank} · 🪙 ${user.prime_coins.toLocaleString()} coins`;

    const history = await MongoAPI.getPPHistory(phone);
    if (!history || !history.length) {
      listEl.innerHTML = '<div class="pp-history-empty">No transactions yet</div>';
      return;
    }

    listEl.innerHTML = history.map(h => {
      const d = h.timestamp ? new Date(h.timestamp) : null;
      const timeStr = d ? d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) + ' · ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' }) : '';
      return `
        <div class="pp-history-row">
          <div>
            <div class="pp-history-reason">${h.reason || 'PP update'}</div>
            <div class="pp-history-time">${timeStr} · by ${h.granted_by || 'system'}</div>
          </div>
          <div class="pp-history-amt ${h.amount > 0 ? 'gain' : 'loss'}">${h.amount > 0 ? '+' : ''}${h.amount} ◈</div>
        </div>`;
    }).join('');
  }

  /* ── Cashout Requests ─────────────────────────────── */
  async function loadCashouts() {
    const alertsEl = document.getElementById('cashout-alerts');
    const listEl = document.getElementById('cashout-list');

    const cashouts = await API.getCashouts();

    if (!cashouts || !cashouts.length) {
      alertsEl.innerHTML = '';
      listEl.innerHTML = '<div class="pp-history-empty">No cashout requests yet</div>';
      return;
    }

    const pending = cashouts.filter(c => (c.status || 'pending') === 'pending');

    alertsEl.innerHTML = pending.length
      ? `<div class="cashout-alert">🔔 ${pending.length} pending cashout request${pending.length > 1 ? 's' : ''} need${pending.length > 1 ? '' : 's'} review</div>`
      : '';

    listEl.innerHTML = cashouts.map(c => {
      const status = c.status || 'pending';
      const date = c.created_at ? new Date(c.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short' }) : '';
      return `
        <div class="cashout-row">
          <div>
            <div style="color:var(--text)">${c.phone || c.user_phone || 'Unknown'} — ${c.amount ? c.amount.toLocaleString() : '—'} PP</div>
            <div class="pp-history-time">${date}</div>
          </div>
          <span class="cashout-status ${status}">${status}</span>
        </div>`;
    }).join('');
  }

  /* ── Boot ─────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', () => {
    if (sessionStorage.getItem(CONFIG.admin.sessionKey) === '1') {
      showAdmin();
    }
  });
</script>
</body>
</html>
