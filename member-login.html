<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AniGamble HQ — Player Login</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 1rem;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .login-logo {
      font-size: 44px;
      display: block;
      margin-bottom: 0.5rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }

    .login-name {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .login-tag {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 4px;
    }

    .login-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
    }

    .login-card h2 {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .login-card p {
      font-size: 12.5px;
      color: var(--text-3);
      margin-bottom: 1.5rem;
      line-height: 1.55;
    }

    .field { margin-bottom: 1rem; }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--text-2);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.65rem 0.9rem;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      box-sizing: border-box;
    }

    .field input:focus { border-color: var(--accent); }

    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.7rem;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font-display);
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .login-btn:hover { opacity: 0.88; }
    .login-btn:active { transform: scale(0.98); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-error {
      background: rgba(226,75,74,0.12);
      border: 1px solid rgba(226,75,74,0.25);
      color: #E24B4A;
      border-radius: var(--radius);
      padding: 0.6rem 0.85rem;
      font-size: 12.5px;
      margin-top: 0.85rem;
      display: none;
    }

    .login-error.show { display: block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: var(--text-3);
      font-size: 11px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .admin-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      color: var(--text-3);
      font-size: 12px;
      text-decoration: none;
      padding: 0.55rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-3);
      transition: all 0.15s;
    }
    .admin-link:hover { color: var(--text); border-color: var(--text-3); }

    .spinner-sm {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .login-btn.loading .spinner-sm { display: block; }
    .login-btn.loading .btn-label { display: none; }
    @keyframes spin { to{ transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="login-wrap fade-in">
  <div class="login-brand">
    <span class="login-logo">🎴</span>
    <div class="login-name">AniGamble HQ</div>
    <div class="login-tag">Player Portal</div>
  </div>

  <div class="login-card">
    <h2>Welcome back, player</h2>
    <p>Enter your registered phone number to view your profile and stats.</p>

    <div class="field">
      <label>Phone Number</label>
      <input type="tel" id="phone-input" placeholder="e.g. 123456789" autocomplete="tel" inputmode="numeric"/>
    </div>

    <div class="field">
      <label>Access Code</label>
      <input type="text" id="code-input" placeholder="First 4 characters of your ID" autocomplete="off" maxlength="4"/>
    </div>

    <button class="login-btn" id="login-btn">
      <span class="btn-label">View My Profile</span>
      <div class="spinner-sm"></div>
    </button>
    <div class="login-error" id="login-error">Incorrect phone number or access code.</div>

    <div class="divider">or</div>
    <a href="login.html" class="admin-link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Admin login
    </a>
  </div>
</div>

<script src="data/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
  // If already logged in as member, skip to profile
  const savedPhone = sessionStorage.getItem('agi_member_phone');
  if (savedPhone) {
    window.location.href = 'profile.html';
  }

  async function attemptMemberLogin() {
    const raw = document.getElementById('phone-input').value.trim().replace(/\s+/g, '');
    const code = document.getElementById('code-input').value.trim();
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');

    if (!raw || !code) return;

    btn.classList.add('loading');
    btn.disabled = true;
    err.classList.remove('show');

    const result = await API.getUserByPhone(raw);
    const user = App.parseUser(result?.[0]);

    btn.classList.remove('loading');
    btn.disabled = false;

    // Require the access code to match the first 4 characters of the
    // player's private row id — short enough to type, still tied to a
    // value only the admin can hand out (it's never shown in the UI).
    const shortCode = (user?._rowId || '').slice(0, 4).toLowerCase();
    if (!user || shortCode !== code.toLowerCase()) {
      err.classList.add('show');
      setTimeout(() => err.classList.remove('show'), 4000);
      return;
    }

    // Save to session
    sessionStorage.setItem('agi_member_phone', raw);
    sessionStorage.setItem('agi_member_name', user.name);
    window.location.href = 'profile.html';
  }

  document.getElementById('login-btn').addEventListener('click', attemptMemberLogin);
  document.getElementById('phone-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') attemptMemberLogin();
  });
  document.getElementById('code-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') attemptMemberLogin();
  });
</script>
</body>
</html>
