<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AniGamble HQ — My Deck</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="stylesheet" href="css/premium.css">
  <style>
    /* ── Deck Grid — strict 3×3 ────────────────────────── */
    .deck-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .deck-tile {
      aspect-ratio: 5 / 7;
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      background: var(--bg-3);
      border: 1px solid var(--border);
      transition: border-color .15s, transform .15s;
    }

    .deck-tile.filled { cursor: pointer; }
    .deck-tile.filled:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }

    .deck-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .deck-tile-name {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 4px 5px 5px;
      font-size: 9.5px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .deck-tile.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      border-style: dashed;
      cursor: pointer;
    }

    .deck-tile.empty:hover {
      border-color: var(--border-2);
      background: var(--bg-4);
    }

    .deck-tile.empty span {
      font-size: 22px;
      color: var(--text-3);
      opacity: 0.5;
    }

    .deck-tile-remove {
      position: absolute;
      top: 4px; right: 4px;
      width: 20px; height: 20px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 10px;
      line-height: 20px;
      text-align: center;
      cursor: pointer;
      padding: 0;
      z-index: 2;
      transition: background .15s;
    }
    .deck-tile-remove:hover { background: var(--danger); }

    /* ── Card Picker ──────────────────────────────────── */
    .picker-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 410;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: fadeIn .2s ease;
    }

    .picker-overlay.open { display: flex; }

    .picker-card {
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-xl, 20px);
      width: 100%;
      max-width: 420px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04);
      animation: popupIn .25s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .picker-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.1rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 14px;
    }

    .picker-header button {
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 26px; height: 26px;
      color: var(--text-2);
      cursor: pointer;
      font-size: 12px;
    }

    #picker-list {
      overflow-y: auto;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .picker-item {
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 7px 9px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }

    .picker-item img {
      width: 30px; height: 42px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .picker-item:hover { border-color: var(--border-2); background: var(--bg-4); }

    .picker-item.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Page card ────────────────────────────────────── */
    .deck-page-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .deck-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: 10px;
    }

    .deck-page-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .deck-page-subtitle {
      font-size: 12.5px;
      color: var(--text-3);
      margin-top: 3px;
    }

    .deck-image-btn {
      font-size: 12px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid var(--border-2);
      background: var(--bg-3);
      color: var(--text-2);
      cursor: pointer;
      white-space: nowrap;
      transition: border-color .15s, color .15s;
    }
    .deck-image-btn:hover { border-color: var(--accent); color: var(--text); }
    .deck-image-btn:disabled { opacity: 0.6; cursor: default; }

    /* ── Slot counter ─────────────────────────────────── */
    .slot-counter {
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .slot-pip {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--bg-4);
      border: 1px solid var(--border);
      transition: background .2s;
    }
    .slot-pip.filled { background: var(--accent); border-color: var(--accent); }

    /* ── Back link ────────────────────────────────────── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-3);
      text-decoration: none;
      margin-bottom: 1rem;
      transition: color .15s;
    }
    .back-link:hover { color: var(--text); }

    @keyframes popupIn {
      from { opacity: 0; transform: scale(.94) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .inv-empty {
      font-size: 12px;
      color: var(--text-3);
      padding: 0.5rem 0;
    }

    /* ── Skeleton ─────────────────────────────────────── */
    .skel {
      background: linear-gradient(90deg, var(--bg-3) 25%, var(--bg-4) 50%, var(--bg-3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ══════════════════════════════════════════════════════
       BACKGROUND CHANGER  — applies to the deck grid only
    ══════════════════════════════════════════════════════ */
    .bg-changer-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1.25rem;
      position: relative;
      overflow: hidden;
    }
    .bg-changer-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
    }

    .bg-changer-title {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.55px;
      margin-bottom: 0.85rem;
    }

    .bg-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .bg-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    .bg-option-swatch {
      width: 48px;
      height: 48px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      transition: border-color .15s, transform .15s, box-shadow .15s;
      position: relative;
      overflow: hidden;
    }

    .bg-option:hover .bg-option-swatch {
      border-color: var(--border-2);
      transform: translateY(-2px);
    }

    .bg-option.active .bg-option-swatch {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(124,93,250,.3);
    }

    .bg-option-label {
      font-size: 9.5px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      text-align: center;
      line-height: 1.3;
    }
    .bg-option-price {
      font-size: 9px;
      color: var(--pp-color);
      font-weight: 700;
      text-align: center;
    }
    .bg-option.active .bg-option-label { color: var(--accent); }

    .swatch-locked-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    /* The deck grid gets the background, not the page */
    #deck-grid {
      border-radius: var(--radius);
      padding: 10px;
      transition: background 0.3s ease;
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" style="max-width:860px;">

    <a href="profile.html" class="back-link">← Back to Profile</a>

    <!-- Loading -->
    <div id="loading-state">
      <div class="deck-page-card">
        <div class="skel" style="width:180px;height:22px;margin-bottom:10px;"></div>
        <div class="skel" style="width:120px;height:12px;margin-bottom:1.5rem;"></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
          ${Array(9).fill('<div class="skel" style="aspect-ratio:5/7;border-radius:8px;"></div>').join('')}
        </div>
      </div>
    </div>

    <!-- Deck content -->
    <div id="deck-content" style="display:none;">

      <!-- Background Changer -->
      <div class="bg-changer-card fade-in">
        <div class="bg-changer-title">🎨 Deck Background</div>
        <div class="bg-options" id="bg-options-row"></div>
      </div>

      <div class="deck-page-card fade-in">
        <div class="deck-page-header">
          <div>
            <div class="deck-page-title">🎴 My Deck</div>
            <div class="deck-page-subtitle" id="deck-subtitle">Arrange up to 9 cards for your showcase</div>
          </div>
          <button id="deck-image-btn" class="deck-image-btn" onclick="generateDeckImage()">📤 Update WhatsApp Image</button>
        </div>

        <!-- Slot pips -->
        <div class="slot-counter">
          <span id="slot-pips"></span>
          <span id="slot-count-label"></span>
        </div>

        <!-- The grid -->
        <div class="deck-grid" id="deck-grid"></div>
        <div id="deck-image-status" style="margin-top:10px;font-size:12px;"></div>
      </div>

    </div>

    <!-- Not found -->
    <div id="not-found" style="display:none;" class="deck-page-card fade-in">
      <div style="text-align:center;padding:3rem 1rem;">
        <div style="font-size:48px;margin-bottom:1rem;">🔍</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:.5rem;">Session expired</div>
        <div style="font-size:13px;color:var(--text-3);margin-bottom:1.5rem;">Please log in again.</div>
        <a href="member-login.html" style="background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:.55rem 1.2rem;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;">Log in</a>
      </div>
    </div>

  </main>
</div>

<!-- Card Picker Modal -->
<div class="picker-overlay" id="picker-overlay" onclick="closeSlotPicker(event)">
  <div class="picker-card">
    <div class="picker-header">
      <span>Choose a card</span>
      <button onclick="closeSlotPicker()">✕</button>
    </div>
    <div id="picker-list"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="data/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/profile.js"></script>
<script>
  let currentUser = null;
  const DECK_SIZE = 9;

  /* ── Background Changer (deck grid only) ────────────── */
  function bgKey(phone) { return `agi_deck_bg_${phone}`; }

  // price: 0 = free. bg: CSS value applied to #deck-grid background.
  const BG_PRESETS = [
    { key: 'default', label: 'Default', price: 0,      bg: '',
      swatch: 'background:var(--bg-3);' },
    { key: 'white',   label: 'White',   price: 0,      bg: '#ffffff',
      swatch: 'background:#ffffff;' },
    { key: 'black',   label: 'Black',   price: 0,      bg: '#0a0a0a',
      swatch: 'background:#0a0a0a;' },
    { key: 'pink',    label: 'Pink 💗', price: 67000,  bg: 'linear-gradient(135deg,#fce4ec,#f48fb1)',
      swatch: 'background:linear-gradient(135deg,#fce4ec,#f48fb1);' },
    { key: 'red',     label: 'Red',     price: 80000,  bg: 'linear-gradient(135deg,#1a0000,#4a0000)',
      swatch: 'background:linear-gradient(135deg,#3a0000,#7a0000);' },
    { key: 'green',   label: 'Green',   price: 80000,  bg: 'linear-gradient(135deg,#001a00,#003a00)',
      swatch: 'background:linear-gradient(135deg,#003a00,#006600);' },
    { key: 'gold',    label: 'Gold ✨', price: 120000, bg: 'linear-gradient(135deg,#1a1000,#4a3500,#8a6200)',
      swatch: 'background:linear-gradient(135deg,#4a3500,#c8860a);' },
    { key: 'galaxy',  label: 'Galaxy',  price: 150000, bg: 'linear-gradient(135deg,#0d001a,#1a0040,#000d2e)',
      swatch: 'background:linear-gradient(135deg,#1a0040,#000d2e);' },
    { key: 'sunset',  label: 'Sunset',  price: 150000, bg: 'linear-gradient(135deg,#3d1500,#7a2800,#3d0a1a)',
      swatch: 'background:linear-gradient(135deg,#ff6b35,#e84393);' },
    { key: 'custom',  label: 'Custom',  price: 250000, bg: null,
      swatch: 'background:conic-gradient(#f472b6,#a78bfa,#60a5fa,#34d399,#fbbf24,#f472b6);' },
  ];

  function applyDeckBackground(key, ppPoints) {
    const grid = document.getElementById('deck-grid');
    if (!grid) return;
    const preset = BG_PRESETS.find(p => p.key === key);
    if (!preset) return;

    const owned = currentUser ? getOwnedBgs(currentUser) : new Set();
    const unlocked = preset.price === 0 || owned.has(key);
    if (!unlocked) { grid.style.background = ''; return; }

    if (key === 'custom') {
      const phone = localStorage.getItem('agi_member_phone');
      const hex = currentUser?._raw?.deckBgCustom
               || localStorage.getItem(bgKey(phone) + '_custom')
               || '#1a1040';
      grid.style.background = hex;
    } else {
      grid.style.background = preset.bg;
    }
  }

  function rebuildBgOptions(ppPoints, current) {
    const container = document.getElementById('bg-options-row');
    if (!container) return;
    const owned = currentUser ? getOwnedBgs(currentUser) : new Set();
    container.innerHTML = BG_PRESETS.map(p => {
      const unlocked  = p.price === 0 || owned.has(p.key);
      const affordable = ppPoints >= p.price;
      const locked    = !unlocked;
      const priceLabel = p.price > 0
        ? (unlocked ? '✓ Owned' : `◈ ${(p.price / 1000).toFixed(0)}k`)
        : 'Free';
      return `
        <div class="bg-option ${current === p.key ? 'active' : ''}" onclick="chooseBg('${p.key}')">
          <div class="bg-option-swatch" style="${p.swatch}">
            ${locked ? '<div class="swatch-locked-overlay">🔒</div>' : ''}
          </div>
          <div class="bg-option-label">${p.label}</div>
          <div class="bg-option-price" style="${unlocked && p.price > 0 ? 'color:var(--success)' : ''}">${priceLabel}</div>
        </div>`;
    }).join('');
  }

  // Returns the set of background keys the user has already purchased (stored in their data)
  function getOwnedBgs(user) {
    const owned = user._raw?.deckBgsOwned;
    if (Array.isArray(owned)) return new Set(owned);
    return new Set(); // free ones are always accessible, no need to list them
  }

  async function chooseBg(key) {
    if (!currentUser) return;
    const ppPoints = currentUser.primePoints || 0;
    const preset   = BG_PRESETS.find(p => p.key === key);
    if (!preset) return;

    const owned = getOwnedBgs(currentUser);
    const alreadyOwned = preset.price === 0 || owned.has(key);

    // Locked and not yet purchased — deduct PP first
    if (!alreadyOwned) {
      if (ppPoints < preset.price) {
        const need = (preset.price - ppPoints).toLocaleString();
        App.showToast(`◈ ${need} Prime Points needed to unlock ${preset.label.replace(/\s*[\u{1F000}-\u{1FFFF}✨💗].*/u, '').trim()}.`, 'error');
        return;
      }

      // Confirm purchase then deduct
      const confirmed = confirm(`Purchase ${preset.label.replace(/\s*[\u{1F000}-\u{1FFFF}✨💗].*/u, '').trim()} background for ◈ ${preset.price.toLocaleString()} Prime Points?`);
      if (!confirmed) return;

      try {
        // Use PPApi.adjustPP so PP history, rank, and balance all update correctly.
        // adjustPP returns null if the write didn't actually succeed — must check this
        // before touching local state, or PP can appear spent when it never really was.
        const ppRes = await PPApi.adjustPP(
          currentUser._rowId,
          currentUser._raw,
          -preset.price,
          `Bought ${preset.label.replace(/\s*[\u{1F000}-\u{1FFFF}✨💗].*/u, '').trim()} deck background`,
          'system'
        );

        if (!ppRes) {
          App.showToast("Couldn't save the purchase — check your connection and try again. Nothing was charged.", 'error');
          return;
        }

        // Reflect the confirmed PP deduction locally
        currentUser._raw.primePoints = ppRes.primePoints;
        currentUser._raw.rank        = ppRes.rank;
        currentUser._raw.ppHistory   = ppRes.ppHistory;
        currentUser.primePoints      = ppRes.primePoints;

        // Save owned list + active bg into Supabase so it persists across devices
        const newOwned = [...Array.from(owned), key];
        const ownedRes = await API.updateUserData(currentUser._rowId, currentUser._raw, {
          deckBgsOwned: newOwned,
          deckBgActive: key,
        });

        if (!Array.isArray(ownedRes) || !ownedRes.length) {
          // PP was already spent and confirmed — don't pretend the background unlocked too.
          App.showToast('PP was spent, but saving the background failed — reloading to check your real state.', 'error');
          await loadDeckPage();
          return;
        }

        // Reflect locally so UI updates without a full reload
        currentUser._raw.deckBgsOwned = newOwned;
        currentUser._raw.deckBgActive = key;

        App.showToast(`${preset.label} background unlocked! ◈ ${preset.price.toLocaleString()} spent.`, 'success');
      } catch (e) {
        console.error('[BG Purchase]', e);
        App.showToast('Purchase failed — try again.', 'error');
        return;
      }
    }

    if (key === 'custom') {
      // Toggle inline color picker
      let picker = document.getElementById('custom-inline-picker');
      if (!picker) {
        picker = document.createElement('div');
        picker.id = 'custom-inline-picker';
        picker.style.cssText = 'display:flex;align-items:center;gap:10px;margin-top:0.85rem;padding:0.75rem;background:var(--bg-3);border-radius:var(--radius);border:1px solid var(--border);';
        picker.innerHTML = `
          <input type="color" id="custom-color-input" value="#1a1040"
            style="width:44px;height:44px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;padding:2px;" />
          <span style="font-size:12.5px;color:var(--text-2);flex:1;">Pick any color for your deck</span>
          <button onclick="applyCustomColor()" style="background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:0.4rem 0.9rem;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-display);">Apply</button>`;
        document.getElementById('bg-options-row').after(picker);
      } else {
        picker.style.display = picker.style.display === 'none' ? 'flex' : 'none';
      }
      // Rebuild so lock icon updates after purchase
      rebuildBgOptions(currentUser.primePoints || 0, key);
      return;
    }

    // Hide custom picker if switching to a preset
    const picker = document.getElementById('custom-inline-picker');
    if (picker) picker.style.display = 'none';

    const phone = localStorage.getItem('agi_member_phone');
    localStorage.setItem(bgKey(phone), key); // local cache for instant paint on next load
    // Also persist to Supabase so it loads on any device
    const res = await API.updateUserData(currentUser._rowId, currentUser._raw, { deckBgActive: key });
    if (Array.isArray(res) && res.length) {
      currentUser._raw.deckBgActive = key;
    } else {
      App.showToast("Background changed here, but didn't save — it may revert on other devices.", 'info');
    }
    applyDeckBackground(key, currentUser.primePoints || 0);
    rebuildBgOptions(currentUser.primePoints || 0, key);
  }

  async function applyCustomColor() {
    if (!currentUser) return;
    const owned = getOwnedBgs(currentUser);
    if (!owned.has('custom')) return;
    const inp = document.getElementById('custom-color-input');
    if (!inp) return;
    const hex   = inp.value;
    const phone = localStorage.getItem('agi_member_phone');

    const res = await API.updateUserData(currentUser._rowId, currentUser._raw, {
      deckBgActive: 'custom',
      deckBgCustom: hex,
    });

    if (!Array.isArray(res) || !res.length) {
      App.showToast("Couldn't save your color — check your connection and try again.", 'error');
      return;
    }

    localStorage.setItem(bgKey(phone), 'custom');
    localStorage.setItem(bgKey(phone) + '_custom', hex);
    currentUser._raw.deckBgActive = 'custom';
    currentUser._raw.deckBgCustom = hex;
    const grid = document.getElementById('deck-grid');
    if (grid) grid.style.background = hex;
    rebuildBgOptions(currentUser.primePoints || 0, 'custom');
  }

  function getDeckSlots(user) {
    // Slots are stored 1-indexed: slots[1] = card in position 1, slots[9] = last.
    // Index 0 is always null so slot numbers match array indices directly.
    const saved = Array.isArray(user._raw?.deck?.slots) ? user._raw.deck.slots : [];

    // Detect if data is old 0-indexed format (no null at index 0, length <= 9)
    // vs new 1-indexed format (null at index 0, length <= 10)
    const isOldFormat = saved.length > 0 && saved[0] !== null && saved.length <= DECK_SIZE;

    const slots = [null]; // index 0 always empty
    for (let i = 1; i <= DECK_SIZE; i++) {
      slots[i] = isOldFormat ? (saved[i - 1] ?? null) : (saved[i] ?? null);
    }
    return slots; // length 10: slots[1..9] are the deck positions
  }

  async function saveDeckSlots(slots) {
    if (!currentUser) return;
    const updatedDeck = { ...(currentUser._raw.deck || {}), slots };
    await API.updateUserData(currentUser._rowId, currentUser._raw, { deck: updatedDeck });
    await loadDeckPage();
  }

  async function removeFromDeck(slotIndex) {
    if (!currentUser) return;
    const slots = getDeckSlots(currentUser);
    slots[slotIndex] = null;
    await saveDeckSlots(slots);
  }

  function renderDeck(user) {
    const slots = getDeckSlots(user);
    const filledCount = slots.slice(1).filter(Boolean).length;

    // Slot pips (positions 1–9)
    document.getElementById('slot-pips').innerHTML =
      Array.from({ length: DECK_SIZE }, (_, i) => i + 1)
        .map(i => `<span class="slot-pip ${slots[i] ? 'filled' : ''}"></span>`).join('');
    document.getElementById('slot-count-label').textContent =
      `${filledCount} / ${DECK_SIZE} slots filled`;

    // Grid tiles (positions 1–9)
    document.getElementById('deck-grid').innerHTML =
      Array.from({ length: DECK_SIZE }, (_, i) => i + 1).map(i => {
        const slotId = slots[i];
        const card = slotId ? user.cards.find(c => (typeof c === 'object' ? c.id : c) === slotId) : null;

        if (!card) {
          return `<div class="deck-tile empty" onclick="openSlotPicker(${i})"><span>+</span></div>`;
        }

        const safeJson = JSON.stringify(JSON.stringify(card));
        return `
          <div class="deck-tile filled" onclick="openCardModal(${safeJson})">
            ${card.preRenderedUrl
              ? `<img src="${card.preRenderedUrl}" alt="${card.name || 'Card'}">`
              : `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:28px;">🃏</div>`
            }
            <div class="deck-tile-name">${card.name || 'Unknown'}</div>
            <button class="deck-tile-remove" onclick="event.stopPropagation();removeFromDeck(${i})" title="Remove from deck">✕</button>
          </div>`;
      }).join('');
  }

  async function loadDeckPage() {
    const phone = localStorage.getItem('agi_member_phone');
    if (!phone) { window.location.href = 'member-login.html'; return; }

    const raw  = await API.getUserByPhone(phone);
    const user = App.parseUser(raw?.[0]);

    document.getElementById('loading-state').style.display = 'none';

    if (!user) {
      document.getElementById('not-found').style.display = 'block';
      return;
    }

    currentUser = user;
    document.getElementById('deck-content').style.display = 'block';
    document.title = `${user.name}'s Deck — AniGamble HQ`;

    // Active bg: Supabase is truth (works across devices), localStorage is a fast paint cache
    const savedBg = user._raw?.deckBgActive
                 || localStorage.getItem(bgKey(phone))
                 || 'default';
    // Sync local cache to match Supabase
    if (user._raw?.deckBgActive) localStorage.setItem(bgKey(phone), user._raw.deckBgActive);
    applyDeckBackground(savedBg, user.primePoints || 0);
    rebuildBgOptions(user.primePoints || 0, savedBg);

    renderDeck(user);
  }

  /* ── Card Picker ──────────────────────────────────────── */
  let pickerSlotIndex = null;

  function openSlotPicker(slotIndex) {
    if (!currentUser) return;
    pickerSlotIndex = slotIndex;

    const usedIds = new Set(getDeckSlots(currentUser).slice(1).filter(Boolean));
    const list = document.getElementById('picker-list');

    if (!currentUser.cards.length) {
      list.innerHTML = '<div class="inv-empty">You don\'t have any cards yet.</div>';
    } else {
      list.innerHTML = currentUser.cards.map(c => {
        const card = typeof c === 'object' ? c : { name: c };
        const inUse = card.id && usedIds.has(card.id);
        const disabled = inUse || !card.id;
        return `
          <div class="picker-item ${disabled ? 'disabled' : ''}" ${disabled ? '' : `onclick="placeInSlot('${card.id}')"`}>
            ${card.preRenderedUrl
              ? `<img src="${card.preRenderedUrl}" alt="">`
              : `<span style="font-size:18px;">🃏</span>`
            }
            <div style="min-width:0;flex:1;">
              <div style="font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${card.name || 'Unknown'}</div>
              <div style="font-size:10.5px;color:var(--text-3);">${inUse ? 'Already in deck' : (card.badge || card.tier || '')}</div>
            </div>
          </div>`;
      }).join('');
    }

    document.getElementById('picker-overlay').classList.add('open');
  }

  function closeSlotPicker(e) {
    if (e && e.target !== document.getElementById('picker-overlay')) return;
    document.getElementById('picker-overlay').classList.remove('open');
    pickerSlotIndex = null;
  }

  async function placeInSlot(cardId) {
    if (pickerSlotIndex === null || !cardId) return;
    const slots = getDeckSlots(currentUser);
    slots[pickerSlotIndex] = cardId;
    document.getElementById('picker-overlay').classList.remove('open');
    pickerSlotIndex = null;
    await saveDeckSlots(slots);
  }

  /* ── Deck Image Generator (html2canvas HD) ───────────── */
  async function generateDeckImage() {
    if (!currentUser) return;
    const btn     = document.getElementById('deck-image-btn');
    const status  = document.getElementById('deck-image-status');
    const deckGrid = document.getElementById('deck-grid');
    if (!deckGrid) return;

    btn.disabled = true;
    btn.textContent = 'Rendering…';
    status.innerHTML = '⏳ Generating high-res showcase...';

    try {
      // Render the live DOM grid at 3× for crisp HD output
      const canvas = await html2canvas(deckGrid, {
        scale:        3,
        useCORS:      true,
        allowTaint:   false,
        logging:      false,
        imageTimeout: 0,
      });

      // Export as lossless PNG blob
      const blob = await new Promise((resolve, reject) => {
        canvas.toBlob(b => b ? resolve(b) : reject(new Error('blob_null')), 'image/png');
      });

      status.innerHTML = '📤 Uploading HD image...';

      // Upload to your bot's endpoint
      const phone    = localStorage.getItem('agi_member_phone') || 'unknown';
      const formData = new FormData();
      formData.append('deck_image', blob, `deck_${phone}_${Date.now()}.png`);
      formData.append('phone', phone);

      const response = await fetch('/api/upload-deck-image', {
        method: 'POST',
        body:   formData,
      });

      if (!response.ok) throw new Error(`Server error: ${response.status}`);

      // Also save the URL back to Supabase if the server returns one
      let deckImageUrl = null;
      try {
        const json = await response.json();
        deckImageUrl = json?.url || json?.data?.url || null;
      } catch (_) { /* server returned no JSON body — that's fine */ }

      if (deckImageUrl) {
        await API.updateUserData(currentUser._rowId, currentUser._raw, { webDeckUrl: deckImageUrl });
        currentUser._raw.webDeckUrl = deckImageUrl;
        status.innerHTML = `<span style="color:var(--success);">✨ Synced in HD!</span> <a href="${deckImageUrl}" target="_blank" rel="noopener" style="color:var(--accent);">View image</a>`;
      } else {
        status.innerHTML = `<span style="color:var(--success);">✨ WhatsApp image synced in perfect HD!</span>`;
      }

    } catch (err) {
      console.error('[Deck Image]', err);
      status.innerHTML = `<span style="color:var(--danger);">❌ ${err.message || 'Failed to generate image — check console.'}</span>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '📤 Update WhatsApp Image';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderSidebar('deck');
    loadDeckPage();
  });
</script>
</body>
</html>
