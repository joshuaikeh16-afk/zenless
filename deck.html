<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deck — AniGamble HQ</title>
<link rel="stylesheet" href="css/style.css"/>
<link rel="stylesheet" href="css/dashboard.css"/>
<link rel="stylesheet" href="css/animations.css"/>
<link rel="stylesheet" href="css/premium.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  /* Background presets — unchanged from the original file */
  .bg-preset-default { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
  .bg-preset-white   { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); }
  .bg-preset-black   { background: linear-gradient(135deg, #020617 0%, #0f172a 100%); }
  .bg-preset-pink    { background: linear-gradient(135deg, #fbcfe8 0%, #f472b6 100%); }
  .bg-preset-red     { background: linear-gradient(135deg, #fca5a5 0%, #ef4444 100%); }
  .bg-preset-green   { background: linear-gradient(135deg, #bbf7d0 0%, #22c55e 100%); }
  .bg-preset-gold    { background: linear-gradient(135deg, #fef08a 0%, #eab308 100%); }

  .custom-scroll::-webkit-scrollbar       { width: 5px; }
  .custom-scroll::-webkit-scrollbar-track { background: transparent; }
  .custom-scroll::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 99px; }
  .custom-scroll::-webkit-scrollbar-thumb:hover { background: #374151; }

  /* ── Layout, restyled to match the rest of AniGamble HQ ── */
  .zani-workspace { display: flex; flex-wrap: wrap; gap: 1.25rem; align-items: flex-start; }
  .zani-col-left  { width: 100%; max-width: 460px; flex-shrink: 0; display: flex; flex-direction: column; gap: 1rem; }
  .zani-panel     { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem; }

  .zani-user-header { display: flex; align-items: center; justify-content: space-between; }
  .zani-user-info   { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .zani-avatar      { width: 40px; height: 40px; border-radius: var(--radius); background: linear-gradient(135deg, var(--accent), #a855f7); display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; font-size: 14px; flex-shrink: 0; }
  .zani-user-title  { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .zani-user-sub    { font-size: 10px; color: var(--text-3); font-family: monospace; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .zani-badge       { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; padding: 4px 8px; background: var(--bg-3); border: 1px solid var(--border); border-radius: 6px; color: var(--text-3); flex-shrink: 0; }

  .zani-panel-title { font-size: 10.5px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem; display: flex; align-items: center; }

  .bg-grid       { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .bg-pick-btn   { display: flex; flex-direction: column; align-items: center; padding: 6px; border-radius: var(--radius); background: var(--bg-3); border: 1px solid var(--border); cursor: pointer; transition: border-color .15s; }
  .bg-pick-btn:hover { border-color: var(--border-2); }
  .bg-pick-btn.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(124,93,250,.3); }
  .bg-swatch-sq  { width: 100%; aspect-ratio: 1; border-radius: 6px; }
  .bg-pick-label { font-size: 8px; font-weight: 700; color: var(--text-2); margin-top: 4px; text-transform: uppercase; }
  .bg-pick-price { font-size: 7px; color: var(--accent); font-weight: 700; font-family: monospace; }
  .bg-pick-price.free { color: var(--text-3); }

  .zani-deck-head    { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
  .zani-deck-head h4 { font-size: 13px; font-weight: 700; color: var(--text); }
  .zani-deck-head p  { font-size: 10px; color: var(--text-3); margin-top: 2px; }

  .zani-upload-btn { background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 8px 12px; font-size: 11px; font-weight: 700; cursor: pointer; }
  .zani-upload-btn:hover { opacity: .9; }
  .zani-upload-btn:disabled { opacity: .4; cursor: default; }

  .zani-deck-meta     { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: .6rem; margin-bottom: .6rem; }
  #deck-dots          { font-size: 11px; letter-spacing: .2em; color: var(--accent); font-family: monospace; }
  #deck-counter-text  { font-size: 9.5px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .04em; font-family: monospace; }

  .zani-canvas-frame { padding: 4px; background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--radius); }

  #deck-canvas .zani-slot { position: relative; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); background: var(--bg-3); aspect-ratio: 1/1.4; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color .15s; }
  #deck-canvas .zani-slot:hover { border-color: var(--accent); }
  #deck-canvas .zani-slot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  #deck-canvas .zani-slot-empty { color: var(--text-3); font-size: 18px; }
  #deck-canvas .zani-slot-remove { position: absolute; top: 3px; right: 3px; width: 18px; height: 18px; border-radius: 50%; background: rgba(0,0,0,.75); border: none; color: #fff; font-size: 11px; cursor: pointer; z-index: 2; }
  #deck-canvas .zani-slot-remove:hover { background: var(--danger); }
  #deck-canvas .zani-slot-info { position: absolute; left: 0; right: 0; bottom: 0; padding: 5px 6px; background: linear-gradient(to top, rgba(0,0,0,.85), transparent); z-index: 1; }
  #deck-canvas .zani-slot-name   { font-size: 9.5px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #deck-canvas .zani-slot-series { font-size: 8px; color: rgba(255,255,255,.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .zani-status-row { display: flex; align-items: center; justify-content: space-between; font-size: 10.5px; background: var(--bg-3); padding: 8px 10px; border-radius: var(--radius); border: 1px solid var(--border); margin-top: .6rem; }
  .zani-status-row span:first-child { color: var(--text-3); font-family: monospace; }
  #network-logger { color: var(--text-2); font-family: monospace; }

  /* ── Card drawer (right panel) ── */
  #card-drawer { display: none; width: 100%; flex: 1; background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem; flex-direction: column; min-height: 480px; opacity: 0; transition: opacity .2s; }
  #card-drawer.open { display: flex; opacity: 1; }

  .drawer-head    { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: .75rem; margin-bottom: .9rem; }
  .drawer-head h3 { font-size: 13px; font-weight: 700; color: var(--text); }
  .drawer-head p  { font-size: 10px; color: var(--text-3); margin-top: 2px; }
  .drawer-close-btn { width: 24px; height: 24px; border-radius: 6px; background: var(--bg-3); border: 1px solid var(--border); color: var(--text-3); cursor: pointer; }
  .drawer-close-btn:hover { color: var(--text); }

  .drawer-search-wrap { position: relative; margin-bottom: .75rem; }
  .drawer-search-wrap span { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--text-3); }
  #drawer-search { width: 100%; background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px 8px 28px; font-size: 12px; color: var(--text); outline: none; box-sizing: border-box; }
  #drawer-search:focus { border-color: var(--accent); }

  #drawer-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; min-height: 240px; max-height: 440px; }

  .drawer-row { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 7px 9px; border-radius: var(--radius); text-align: left; cursor: pointer; background: var(--bg-3); border: 1px solid var(--border); transition: border-color .15s, background .15s; }
  .drawer-row:hover { border-color: var(--border-2); background: var(--bg-4); }
  .drawer-row.disabled { opacity: .4; cursor: not-allowed; }
  .drawer-row.selected { border-color: var(--accent); background: rgba(124,93,250,.08); }
  .drawer-row img { width: 30px; height: 42px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: var(--bg-3); }
  .drawer-row-name { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .drawer-row-meta { font-size: 9px; display: flex; align-items: center; gap: 4px; margin-top: 2px; }
  .drawer-empty { font-size: 12px; color: var(--text-3); text-align: center; padding: 2rem 0; }

  .drawer-footer { border-top: 1px solid var(--border); padding-top: .75rem; margin-top: .75rem; display: flex; justify-content: flex-end; gap: 8px; }
  .drawer-cancel-btn { padding: 8px 14px; border-radius: var(--radius); font-size: 11px; font-weight: 700; background: var(--bg-3); border: 1px solid var(--border); color: var(--text-2); cursor: pointer; }
  .drawer-cancel-btn:hover { color: var(--text); }
  .drawer-confirm-btn { padding: 8px 16px; border-radius: var(--radius); font-size: 11px; font-weight: 700; background: var(--accent); border: none; color: #fff; cursor: pointer; }
  .drawer-confirm-btn:disabled { opacity: .4; cursor: not-allowed; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" style="max-width:1040px;">

    <div class="zani-workspace">
      <div class="zani-col-left">

        <!-- User header -->
        <div class="zani-panel zani-user-header">
          <div class="zani-user-info">
            <div class="zani-avatar" id="user-avatar">Z</div>
            <div style="min-width:0;">
              <div class="zani-user-title" id="user-title">Profile Interface</div>
              <div class="zani-user-sub" id="user-subtitle">Resolving clusters...</div>
            </div>
          </div>
          <span class="zani-badge">ZANI v2</span>
        </div>

        <!-- Background picker -->
        <div class="zani-panel">
          <div class="zani-panel-title">🎨 Deck Background</div>
          <div class="bg-grid">
            <button id="bg-btn-default" class="bg-pick-btn active" onclick="changeBackground('default')">
              <div class="bg-swatch-sq bg-preset-default"></div>
              <span class="bg-pick-label">Default</span>
              <span class="bg-pick-price free">Free</span>
            </button>
            <button id="bg-btn-white" class="bg-pick-btn" onclick="changeBackground('white')">
              <div class="bg-swatch-sq bg-preset-white"></div>
              <span class="bg-pick-label">White</span>
              <span class="bg-pick-price free">Free</span>
            </button>
            <button id="bg-btn-black" class="bg-pick-btn" onclick="changeBackground('black')">
              <div class="bg-swatch-sq bg-preset-black"></div>
              <span class="bg-pick-label">Black</span>
              <span class="bg-pick-price free">Free</span>
            </button>
            <button id="bg-btn-pink" class="bg-pick-btn" onclick="changeBackground('pink')">
              <div class="bg-swatch-sq bg-preset-pink"></div>
              <span class="bg-pick-label">Pink 💗</span>
              <span class="bg-pick-price">+ 67k</span>
            </button>
            <button id="bg-btn-red" class="bg-pick-btn" onclick="changeBackground('red')">
              <div class="bg-swatch-sq bg-preset-red"></div>
              <span class="bg-pick-label">Red</span>
              <span class="bg-pick-price">+ 80k</span>
            </button>
            <button id="bg-btn-green" class="bg-pick-btn" onclick="changeBackground('green')">
              <div class="bg-swatch-sq bg-preset-green"></div>
              <span class="bg-pick-label">Green</span>
              <span class="bg-pick-price">+ 88k</span>
            </button>
            <button id="bg-btn-gold" class="bg-pick-btn" onclick="changeBackground('gold')">
              <div class="bg-swatch-sq bg-preset-gold"></div>
              <span class="bg-pick-label">Gold ✨</span>
              <span class="bg-pick-price">+ 120k</span>
            </button>
          </div>
        </div>

        <!-- Deck canvas panel -->
        <div class="zani-panel">
          <div class="zani-deck-head">
            <div>
              <h4>🎴 Live Showcase</h4>
              <p>Arrange up to 9 active inventory cards</p>
            </div>
            <button id="upload-btn" class="zani-upload-btn" onclick="exportAndUploadCanvas()">Update WhatsApp Image</button>
          </div>

          <div class="zani-deck-meta">
            <div id="deck-dots">○○○○○○○○○</div>
            <span id="deck-counter-text">0 / 9 slots assigned</span>
          </div>

          <div class="zani-canvas-frame">
            <div id="deck-canvas" class="bg-preset-default" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:8px;border-radius:8px;"></div>
          </div>

          <div class="zani-status-row">
            <span>System Trace Status:</span>
            <span id="network-logger">Idle loop monitoring.</span>
          </div>
        </div>
      </div>

      <!-- Card drawer (right panel) -->
      <div id="card-drawer">
        <div class="drawer-head">
          <div>
            <h3>🎒 Profile Vault Inventory</h3>
            <p id="drawer-slot-subtitle">Configuring space context...</p>
          </div>
          <button class="drawer-close-btn" onclick="closeDrawer()">✕</button>
        </div>

        <div class="drawer-search-wrap">
          <span>🔍</span>
          <input type="text" id="drawer-search" oninput="renderDrawerItems()" placeholder="Search vault by card name or anime series...">
        </div>

        <div id="drawer-list" class="custom-scroll"></div>

        <div class="drawer-footer">
          <button class="drawer-cancel-btn" onclick="closeDrawer()">Cancel</button>
          <button id="drawer-confirm-btn" class="drawer-confirm-btn" disabled onclick="confirmCardAssignment()">Okay</button>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="data/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
  // ─── CONFIG ────────────────────────────────────────────────────────────────
  const CONFIG_BOT = {
    apiHost: "http://jobs.hidencloud.com:24633/api/economy",
    apiKey: "936f46f583278e85da40457c6be357fd22b87f63dd4ca1c0"
  };

  // ─── SUPABASE CLIENT ───────────────────────────────────────────────────────
  const SUPABASE_URL    = 'https://padybdvevwazfilxopqy.supabase.co';
  const SUPABASE_KEY    = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBhZHliZHZldndhemZpbHhvcHF5Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NzM5OTgwNCwiZXhwIjoyMDkyOTc1ODA0fQ.bI3epdb6N4T21At5xkAHcJnKbPKUd0-l2vzr4xGZN8w';
  const BUCKET_NAME     = 'media';
  const supabaseClient  = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ─── STATE ─────────────────────────────────────────────────────────────────
  const STATE = {
    userId: null,
    currentBg: 'default',
    activeSlotIndex: null,
    selectedDrawerCard: null,
    deck: Array(9).fill(null),
    inventory: []
  };

  const RARITY_MAP = {
    'C':          { color: '#94a3b8', dot: '⚪', label: 'Common'     },
    'Common':     { color: '#94a3b8', dot: '⚪', label: 'Common'     },
    'Rare':       { color: '#3b82f6', dot: '🔵', label: 'Rare'       },
    'Super Rare': { color: '#a855f7', dot: '🟣', label: 'SR'         },
    'SSR':        { color: '#eab308', dot: '👑', label: 'SSR'        },
    'UR':         { color: '#ef4444', dot: '🔥', label: 'UR'         }
  };

  // ─── INIT FROM EXISTING SITE SESSION (replaces the old manual login form) ──
  async function initFromSession() {
    const phone = localStorage.getItem('agi_member_phone');
    if (!phone) { window.location.href = 'member-login.html'; return; }

    const logger = document.getElementById('network-logger');
    logger.style.color = '';
    logger.textContent = 'Connecting to bot API...';

    try {
      const response = await fetch(`${CONFIG_BOT.apiHost}/users`, {
        method: "GET",
        headers: { "x-api-key": CONFIG_BOT.apiKey, "Accept": "application/json" }
      });

      if (!response.ok) throw new Error(`HTTP Error Status: ${response.status}`);
      let allUsersMap = await response.json();
      if (typeof allUsersMap === 'string') allUsersMap = JSON.parse(allUsersMap);

      let matchedInternalId  = null;
      let matchedProfileData = null;

      for (const [userId, profile] of Object.entries(allUsersMap)) {
        if (profile?.phoneNumber && String(profile.phoneNumber).trim() === String(phone)) {
          matchedInternalId  = userId;
          matchedProfileData = profile;
          break;
        }
      }

      if (!matchedProfileData) throw new Error("No bot profile found for this phone number.");

      STATE.userId    = matchedInternalId;
      STATE.inventory = matchedProfileData.cards || [];

      document.getElementById('user-title').textContent    = matchedProfileData.name || "My Deck Customizer";
      document.getElementById('user-subtitle').textContent = `Linked: +${matchedProfileData.phoneNumber}`;
      document.getElementById('user-avatar').textContent   = (matchedProfileData.name || "Z").charAt(0).toUpperCase();

      logger.style.color = 'var(--success)';
      logger.textContent = "Successfully connected and verified.";

      if (Array.isArray(matchedProfileData.activeDeckLayout)) {
        matchedProfileData.activeDeckLayout.forEach((c, i) => { if (c) STATE.deck[i] = c; });
      }

      renderDeckCanvas();

    } catch (err) {
      console.error(err);
      logger.style.color = 'var(--danger)';
      logger.textContent = `⚠️ ${err.message}`;
    }
  }

  // ─── HELPERS ───────────────────────────────────────────────────────────────
  function getCardImageUrl(card) {
    if (!card) return "https://cdn7.mazoku.cc/cards/default.webp";
    const path = card.preRenderedUrl || card.url || card.image || card.img || card.imageUrl;
    if (path && (path.startsWith('http') || path.startsWith('data:'))) return path;
    return card.id
      ? `https://cdn7.mazoku.cc/cards/${card.id}.webp`
      : "https://cdn7.mazoku.cc/cards/default.webp";
  }

  // ─── BACKGROUND ────────────────────────────────────────────────────────────
  function changeBackground(presetName) {
    document.querySelectorAll('[id^="bg-btn-"]').forEach(el => el.classList.remove('active'));
    document.getElementById(`bg-btn-${presetName}`).classList.add('active');
    const canvas = document.getElementById('deck-canvas');
    canvas.className = `bg-preset-${presetName}`;
    canvas.style.display = 'grid';
    canvas.style.gridTemplateColumns = 'repeat(3,1fr)';
    canvas.style.gap = '10px';
    canvas.style.padding = '8px';
    canvas.style.borderRadius = '8px';
    STATE.currentBg = presetName;
  }

  // ─── DECK CANVAS ───────────────────────────────────────────────────────────
  function renderDeckCanvas() {
    const canvas = document.getElementById('deck-canvas');
    canvas.innerHTML = '';
    let filled = 0;

    STATE.deck.forEach((card, index) => {
      const slot = document.createElement('div');
      slot.className = "zani-slot";

      if (card) {
        filled++;
        slot.innerHTML = `
          <img src="${getCardImageUrl(card)}" onerror="this.src='https://cdn7.mazoku.cc/cards/default.webp'">
          <button onclick="event.stopPropagation(); removeCardFromSlot(${index})" class="zani-slot-remove">&times;</button>
          <div class="zani-slot-info">
            <div class="zani-slot-name">${card.name}</div>
            <div class="zani-slot-series">${card.seriesName || 'Unknown Series'}</div>
          </div>`;
      } else {
        slot.innerHTML = `<span class="zani-slot-empty">&plus;</span>`;
      }

      slot.onclick = () => openDrawerSelector(index);
      canvas.appendChild(slot);
    });

    document.getElementById('deck-counter-text').textContent = `${filled} / 9 slots assigned`;
    document.getElementById('deck-dots').textContent = Array.from({ length: 9 }, (_, i) => i < filled ? '●' : '○').join('');
  }

  // ─── DRAWER ────────────────────────────────────────────────────────────────
  function openDrawerSelector(slotIndex) {
    STATE.activeSlotIndex    = slotIndex;
    STATE.selectedDrawerCard = null;

    const confirmBtn = document.getElementById('drawer-confirm-btn');
    confirmBtn.disabled = true;

    document.getElementById('drawer-slot-subtitle').textContent = `Configuring grid index space: Slot ${slotIndex + 1}`;
    document.getElementById('drawer-search').value = '';

    const drawer = document.getElementById('card-drawer');
    drawer.classList.add('open');
    setTimeout(() => drawer.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 10);

    renderDrawerItems();
  }

  function closeDrawer() {
    document.getElementById('card-drawer').classList.remove('open');
    STATE.activeSlotIndex    = null;
    STATE.selectedDrawerCard = null;
  }

  function renderDrawerItems() {
    const listContainer = document.getElementById('drawer-list');
    const query = document.getElementById('drawer-search').value.toLowerCase().trim();
    listContainer.innerHTML = '';

    const equippedIds = STATE.deck.filter(Boolean).map(c => c.id);
    const filtered = STATE.inventory.filter(card => {
      const name   = (card?.name       || '').toLowerCase();
      const series = (card?.seriesName || '').toLowerCase();
      return name.includes(query) || series.includes(query);
    });

    if (!filtered.length) {
      listContainer.innerHTML = `<div class="drawer-empty">No matching inventory records located inside your wallet.</div>`;
      return;
    }

    filtered.forEach(card => {
      const isEquipped  = equippedIds.includes(card.id);
      const isSelected  = STATE.selectedDrawerCard?.id === card.id;
      const rarity      = RARITY_MAP[card.tier] || RARITY_MAP['C'];

      const rowBtn = document.createElement('button');
      let cls = "drawer-row";
      if      (isEquipped) cls += " disabled";
      else if (isSelected) cls += " selected";
      rowBtn.className = cls;
      rowBtn.onclick   = () => { if (!isEquipped) selectCardInDrawer(card); };

      rowBtn.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;min-width:0;">
          <img src="${getCardImageUrl(card)}" onerror="this.src='https://cdn7.mazoku.cc/cards/default.webp'">
          <div style="min-width:0;">
            <div class="drawer-row-name">${card.name}</div>
            <div class="drawer-row-meta" style="color:${rarity.color}">
              <span>${rarity.dot}</span>
              <span style="font-weight:700;text-transform:uppercase;">${rarity.label}</span>
              <span style="color:var(--text-3);font-family:monospace;">| ID: ${card.id}</span>
            </div>
          </div>
        </div>
        <div style="flex-shrink:0;text-align:right;padding:0 4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;">
          ${isEquipped
            ? `<span style="color:var(--text-3);">In Deck</span>`
            : isSelected
              ? `<span style="color:var(--accent);font-family:monospace;">✓ READY</span>`
              : `<span style="color:var(--text-3);">SELECT</span>`}
        </div>`;

      listContainer.appendChild(rowBtn);
    });
  }

  function selectCardInDrawer(card) {
    STATE.selectedDrawerCard = card;
    document.getElementById('drawer-confirm-btn').disabled = false;
    renderDrawerItems();
  }

  function confirmCardAssignment() {
    if (STATE.activeSlotIndex === null || !STATE.selectedDrawerCard) return;
    STATE.deck[STATE.activeSlotIndex] = STATE.selectedDrawerCard;
    closeDrawer();
    renderDeckCanvas();
  }

  function removeCardFromSlot(slotIndex) {
    STATE.deck[slotIndex] = null;
    renderDeckCanvas();
  }

  // ─── EXPORT & UPLOAD (SUPABASE) ────────────────────────────────────────────
  async function exportAndUploadCanvas() {
    const uploadBtn   = document.getElementById('upload-btn');
    const targetDOM   = document.getElementById('deck-canvas');
    const logger      = document.getElementById('network-logger');

    uploadBtn.disabled  = true;
    uploadBtn.innerText = "Processing Canvas...";
    logger.style.color  = 'var(--accent)';
    logger.innerText    = "Rendering canvas...";

    try {
      // 1. Render deck canvas to an HTML canvas element
      const renderedCanvas = await html2canvas(targetDOM, {
        scale: 3,
        useCORS: true,
        logging: false,
        onclone: (clonedDoc) => {
          const el = clonedDoc.getElementById('deck-canvas');
          if (el) {
            el.style.backgroundImage = "none";
            el.style.backgroundColor = "#0b0f19";
          }
          // Sanitize modern CSS color engines (oklab/oklch) that break html2canvas
          for (const node of clonedDoc.getElementsByTagName('*')) {
            const s = window.getComputedStyle(node);
            if (s.color?.includes('oklab') || s.color?.includes('oklch'))
              node.style.color = '#ffffff';
            if (s.backgroundColor?.includes('oklab') || s.backgroundColor?.includes('oklch'))
              node.style.backgroundColor = 'transparent';
            if (s.borderColor?.includes('oklab') || s.borderColor?.includes('oklch'))
              node.style.borderColor = '#1f2937';
          }
        }
      });

      logger.innerText = "Encoding image...";

      // 2. Convert canvas → Blob (PNG)
      const blob = await new Promise((resolve, reject) => {
        renderedCanvas.toBlob(b => b ? resolve(b) : reject(new Error("Canvas toBlob returned null.")), 'image/png');
      });

      // 3. Convert Blob → ArrayBuffer for Supabase
      const arrayBuffer = await blob.arrayBuffer();
      const fileName    = `deck_${STATE.userId}_${Date.now()}.png`;

      logger.innerText = "Uploading to Supabase...";

      // 4. Upload to Supabase Storage (upsert so repeated saves overwrite)
      const { error: uploadError } = await supabaseClient.storage
        .from(BUCKET_NAME)
        .upload(fileName, arrayBuffer, {
          contentType: 'image/png',
          upsert: true
        });

      if (uploadError) throw new Error(`Supabase upload failed: ${uploadError.message}`);

      // 5. Get public URL
      const { data: urlData } = supabaseClient.storage
        .from(BUCKET_NAME)
        .getPublicUrl(fileName);

      const publicUrl = urlData?.publicUrl;
      if (!publicUrl) throw new Error("Could not retrieve public URL from Supabase.");

      logger.innerText = "Syncing to database...";

      // 6. PATCH economy API with new URL + deck layout
      const patchRes = await fetch(`${CONFIG_BOT.apiHost}/users/${STATE.userId}`, {
        method: "PATCH",
        headers: {
          "x-api-key": CONFIG_BOT.apiKey,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          webDeckUrl: publicUrl,
          activeDeckLayout: STATE.deck
        })
      });

      if (!patchRes.ok) throw new Error(`Database patch rejected: ${patchRes.status}`);

      logger.style.color = 'var(--success)';
      logger.innerHTML = `✨ Layout synchronized! <a href="${publicUrl}" target="_blank" style="text-decoration:underline;color:var(--accent);">View image</a>`;
      alert("Showcase deck updated and synced into your database configuration records!");

    } catch (err) {
      console.error("Upload error:", err);
      logger.style.color = 'var(--danger)';
      logger.innerText = `❌ ${err.message}`;
    } finally {
      uploadBtn.disabled  = false;
      uploadBtn.innerText = "Update WhatsApp Image";
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderSidebar('deck');
    initFromSession();
  });
</script>
</body>
