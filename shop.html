<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AniGamble HQ — Card Shop</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="stylesheet" href="css/premium.css">
  <style>
    /* ── Shop-specific tokens ─────────────────────────── */
    :root {
      --shop-common:    #8B99B0;
      --shop-uncommon:  #3CB97A;
      --shop-rare:      #378ADD;
      --shop-epic:      #9B59F5;
      --shop-legendary: #F5A623;
      --shop-mythic:    #E84F6B;
    }

    /* ── Layout ───────────────────────────────────────── */
    .shop-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 1.25rem;
      align-items: start;
    }

    @media(max-width: 780px) {
      .shop-layout { grid-template-columns: 1fr; }
      .shop-sidebar { display: none; }
    }

    /* ── Header ───────────────────────────────────────── */
    .shop-banner {
      background: linear-gradient(135deg, #1a0e3a 0%, #0f1525 50%, #12082a 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.75rem 2rem;
      margin-bottom: 1.25rem;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .shop-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 10% 50%, rgba(155,89,245,0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 30%, rgba(248,166,35,0.15) 0%, transparent 50%);
      pointer-events: none;
    }

    .shop-banner-dots {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
    }

    .banner-title {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      line-height: 1.1;
      position: relative;
    }

    .banner-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-top: 5px;
      position: relative;
    }

    .wallet-pill {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-lg);
      padding: 0.75rem 1.25rem;
      text-align: right;
      position: relative;
      min-width: 140px;
    }

    .wallet-pill-label { font-size: 11px; color: rgba(255,255,255,0.45); margin-bottom: 3px; }
    .wallet-pill-val {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
    }

    .wallet-pill-name {
      font-size: 11.5px;
      color: rgba(255,255,255,0.55);
      margin-top: 3px;
    }

    /* ── Sidebar / Filters ────────────────────────────── */
    .shop-sidebar {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem;
      position: sticky;
      top: 1rem;
    }

    .filter-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 0.6rem;
      margin-top: 1rem;
    }

    .filter-title:first-child { margin-top: 0; }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: none;
      border: none;
      border-radius: var(--radius);
      padding: 0.5rem 0.6rem;
      font-size: 13px;
      color: var(--text-2);
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.12s;
      text-align: left;
    }

    .filter-btn:hover { background: var(--bg-3); color: var(--text); }

    .filter-btn.active {
      background: var(--accent-dim, rgba(124,93,250,0.12));
      color: var(--accent);
      font-weight: 600;
    }

    .filter-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .filter-count {
      margin-left: auto;
      font-size: 11px;
      background: var(--bg-3);
      border-radius: 99px;
      padding: 1px 7px;
      color: var(--text-3);
    }

    /* ── Search / sort bar ────────────────────────────── */
    .shop-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .shop-search {
      flex: 1;
      min-width: 160px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.55rem 0.9rem 0.55rem 2.25rem;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      font-family: var(--font-body);
    }

    .shop-search:focus { border-color: var(--accent); }

    .search-wrap { position: relative; flex: 1; min-width: 160px; }

    .search-ico {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      pointer-events: none;
    }

    .sort-select {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.55rem 0.8rem;
      font-size: 13px;
      color: var(--text);
      outline: none;
      cursor: pointer;
      font-family: var(--font-body);
    }

    /* ── Card Grid ────────────────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
      gap: 1rem;
    }

    /* ── Card tile ────────────────────────────────────── */
    .shop-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      position: relative;
    }

    .shop-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    }

    .shop-card.owned {
      opacity: 0.55;
      cursor: default;
    }

    .shop-card.owned:hover { transform: none; box-shadow: none; }

    .card-art {
      height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      position: relative;
      overflow: hidden;
      background: var(--bg-3);
    }

    .card-art-bg {
      position: absolute;
      inset: 0;
      opacity: 0.18;
    }

    .card-art-emoji { position: relative; z-index: 1; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)); }

    .card-rarity-bar { display: none; }

    /* ── Tier header strip — escalates with rarity ────── */
    .tier-strip {
      padding: 5px 0;
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .shop-card.tier-low    .tier-strip { background: var(--bg-3); color: var(--text-3); }
    .shop-card.tier-mid    .tier-strip { background: color-mix(in srgb, var(--tier-color) 16%, transparent); color: var(--tier-color); }
    .shop-card.tier-high   .tier-strip { background: color-mix(in srgb, var(--tier-color) 22%, transparent); color: var(--tier-color); font-weight: 800; }
    .shop-card.tier-top    .tier-strip { background: color-mix(in srgb, var(--tier-color) 28%, transparent); color: var(--tier-color); font-weight: 800; }

    /* ── Card frame — escalates with rarity ────────────── */
    .shop-card.tier-low  { border: 1px solid var(--border); }
    .shop-card.tier-mid  { border: 1px solid var(--tier-color); }
    .shop-card.tier-high {
      border: 2px solid var(--tier-color);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--tier-color) 35%, transparent);
    }
    .shop-card.tier-top {
      border: 2px solid var(--tier-color);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--tier-color) 45%, transparent),
                  0 0 18px color-mix(in srgb, var(--tier-color) 35%, transparent);
    }
    .shop-card.tier-top:hover {
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--tier-color) 55%, transparent),
                  0 0 26px color-mix(in srgb, var(--tier-color) 50%, transparent);
    }

    .owned-ribbon {
      position: absolute;
      top: 10px;
      right: -22px;
      background: var(--success);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 28px;
      transform: rotate(35deg);
      letter-spacing: 0.5px;
    }

    .new-ribbon {
      position: absolute;
      top: 8px;
      left: 8px;
      background: var(--shop-legendary);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      letter-spacing: 0.4px;
      z-index: 2;
    }

    .card-body {
      padding: 0.75rem;
    }

    .card-rarity-tag { display: none; }

    .card-name {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .card-desc {
      font-size: 11.5px;
      color: var(--text-3);
      line-height: 1.45;
      margin-bottom: 0.65rem;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .card-price {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .card-price.pp-price {
      color: #a78bfa;
    }

    .shop-card.tier-top .card-price { color: var(--tier-color); }

    .buy-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.35rem 0.75rem;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-display);
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .shop-card.tier-high .buy-btn,
    .shop-card.tier-top .buy-btn {
      background: var(--tier-color);
    }

    .buy-btn:hover { opacity: 0.85; }
    .buy-btn:active { transform: scale(0.96); }
    .buy-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .buy-btn.loading { opacity: 0.6; }

    .owned-label {
      font-size: 11.5px;
      color: var(--success);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Login gate ───────────────────────────────────── */
    .login-gate {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    .login-gate-icon { font-size: 36px; margin-bottom: 0.75rem; }
    .login-gate-title { font-size: 15px; font-weight: 600; margin-bottom: 0.4rem; }
    .login-gate-sub { font-size: 13px; color: var(--text-3); margin-bottom: 1.25rem; line-height: 1.5; }

    .gate-btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius);
      padding: 0.6rem 1.5rem;
      font-size: 13.5px;
      font-weight: 600;
      font-family: var(--font-display);
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }

    .gate-btn:hover { opacity: 0.88; }

    /* ── Confirm modal ────────────────────────────────── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
    }

    .confirm-overlay.open { display: flex; }

    .confirm-box {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      animation: popIn 0.18s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.92); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .confirm-art { font-size: 56px; margin-bottom: 0.75rem; }
    .confirm-name { font-family: var(--font-display); font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .confirm-rarity { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 0.75rem; }
    .confirm-desc { font-size: 13px; color: var(--text-3); line-height: 1.55; margin-bottom: 1.25rem; }

    .confirm-price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-3);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 13px;
    }

    .confirm-price-row span { color: var(--text-3); }
    .confirm-price-val { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--gold); }
    .confirm-price-val.pp { color: #a78bfa; }

    .confirm-actions { display: flex; gap: 8px; }
    .confirm-cancel {
      flex: 1;
      background: var(--bg-3);
      border: 1px solid var(--border);
      color: var(--text-2);
      border-radius: var(--radius);
      padding: 0.65rem;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-display);
      transition: all 0.15s;
    }
    .confirm-cancel:hover { border-color: var(--text-3); color: var(--text); }

    .confirm-buy {
      flex: 2;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.65rem;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-display);
      transition: opacity 0.15s;
    }
    .confirm-buy:hover { opacity: 0.88; }
    .confirm-buy:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Empty state ──────────────────────────────────── */
    .shop-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-3);
    }
    .shop-empty-icon { font-size: 40px; margin-bottom: 0.75rem; }
    .shop-empty-text { font-size: 14px; }

    /* ── Toast upgrade ────────────────────────────────── */
    .floating-wallet {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 100;
      font-size: 13px;
    }

    .fw-label { color: var(--text-3); font-size: 11px; display: block; }
    .fw-val { font-family: var(--font-display); font-weight: 700; color: var(--gold); font-size: 15px; }
  </style>
</head>
<body>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">

    <!-- Banner -->
    <div class="shop-banner fade-in">
      <div class="shop-banner-dots"></div>
      <div>
        <div class="banner-title">🃏 Card Shop</div>
        <div class="banner-sub">Collect rare cards. Flex on the leaderboard.</div>
      </div>
      <div id="wallet-display" style="display:none;">
        <div class="wallet-pill">
          <div class="wallet-pill-label">Your balance</div>
          <div class="wallet-pill-val" id="wallet-coins">—</div>
          <div class="wallet-pill-name" id="wallet-name"></div>
        </div>
      </div>
    </div>

    <!-- Login gate (shown when not logged in) -->
    <div class="login-gate fade-in" id="login-gate" style="display:none;">
      <div class="login-gate-icon">🔐</div>
      <div class="login-gate-title">Log in to buy cards</div>
      <div class="login-gate-sub">You can still browse the shop. Log in with your phone number to purchase cards and add them to your collection.</div>
      <a href="member-login.html" class="gate-btn">Log in to buy →</a>
    </div>

    <!-- Shop body -->
    <div class="shop-layout">

      <!-- Sidebar filters -->
      <aside class="shop-sidebar fade-in" id="shop-sidebar">
        <div class="filter-title">Rarity</div>
        <button class="filter-btn active" data-rarity="all" onclick="filterRarity('all', this)">
          <span class="filter-dot" style="background:var(--text-3)"></span> All cards
          <span class="filter-count" id="count-all">—</span>
        </button>
        <button class="filter-btn" data-rarity="C" onclick="filterRarity('C', this)">
          <span class="filter-dot" style="background:var(--shop-common)"></span> Common
          <span class="filter-count" id="count-C">0</span>
        </button>
        <button class="filter-btn" data-rarity="R" onclick="filterRarity('R', this)">
          <span class="filter-dot" style="background:var(--shop-rare)"></span> Rare
          <span class="filter-count" id="count-R">0</span>
        </button>
        <button class="filter-btn" data-rarity="SR" onclick="filterRarity('SR', this)">
          <span class="filter-dot" style="background:var(--shop-epic)"></span> Super Rare
          <span class="filter-count" id="count-SR">0</span>
        </button>
        <button class="filter-btn" data-rarity="SSR" onclick="filterRarity('SSR', this)">
          <span class="filter-dot" style="background:var(--shop-legendary)"></span> Super Special Rare
          <span class="filter-count" id="count-SSR">0</span>
        </button>

        <div class="filter-title" style="margin-top:1.25rem;">Collection</div>
        <button class="filter-btn" data-rarity="owned" onclick="filterRarity('owned', this)">
          ✅ Owned
          <span class="filter-count" id="count-owned">0</span>
        </button>
        <button class="filter-btn" data-rarity="unowned" onclick="filterRarity('unowned', this)">
          🆕 Not owned
          <span class="filter-count" id="count-unowned">0</span>
        </button>
      </aside>

      <!-- Main content -->
      <div>
        <!-- Controls -->
        <div class="shop-controls fade-in">
          <div class="search-wrap">
            <span class="search-ico">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
            </span>
            <input class="shop-search" id="search-input" type="text" placeholder="Search cards…" oninput="applyFilters()"/>
          </div>
          <select class="sort-select" id="sort-select" onchange="applyFilters()">
            <option value="rarity">Sort: Rarity</option>
            <option value="price-asc">Price: Low → High</option>
            <option value="price-desc">Price: High → Low</option>
            <option value="name">Name A–Z</option>
          </select>
        </div>

        <!-- Grid -->
        <div class="cards-grid" id="cards-grid">
          <div class="shop-empty">
            <div class="shop-empty-icon">🃏</div>
            <div class="shop-empty-text">Loading cards…</div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- Confirm purchase modal -->
<div class="confirm-overlay" id="confirm-overlay" onclick="closeConfirm(event)">
  <div class="confirm-box" id="confirm-box">
    <div class="confirm-art" id="confirm-art"></div>
    <div class="confirm-name" id="confirm-name"></div>
    <div class="confirm-rarity" id="confirm-rarity"></div>
    <div class="confirm-desc" id="confirm-desc"></div>
    <div class="confirm-price-row">
      <span>Cost</span>
      <div class="confirm-price-val" id="confirm-price-val"></div>
    </div>
    <div class="confirm-actions">
      <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-buy" id="confirm-buy-btn" onclick="confirmBuy()">Buy card</button>
    </div>
  </div>
</div>

<!-- Floating wallet (mobile) -->
<div class="floating-wallet" id="floating-wallet" style="display:none;">
  <div>
    <span class="fw-label">Balance</span>
    <span class="fw-val" id="fw-coins">—</span>
  </div>
</div>

<script src="data/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/profile.js"></script>
<script>
// ── Tier colours (matches real Mazoku tiers) ─────────────────
const TIER_COLOR = {
  C:         'var(--shop-common)',
  Common:    'var(--shop-common)',
  R:         'var(--shop-rare)',
  Uncommon:  'var(--shop-uncommon)',
  Rare:      'var(--shop-rare)',
  SR:        'var(--shop-epic)',
  Epic:      'var(--shop-epic)',
  SSR:       'var(--shop-legendary)',
  Legendary: 'var(--shop-legendary)',
  UR:        'var(--shop-mythic)',
  Mythic:    'var(--shop-mythic)',
};
const TIER_ORDER = {
  C:0, Common:0,
  R:1, Uncommon:1, Rare:1,
  SR:2, Epic:2,
  SSR:3, Legendary:3,
  UR:4, Mythic:4,
};

// ── State ────────────────────────────────────────────────────
let catalogue    = [];   // loaded from __shop
let currentPlayer  = null;
let ownedCardIds   = new Set();
let activeRarity   = 'all';
let confirmTarget  = null;

// ── Init ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  renderSidebar('shop');

  // Load player session
  const phone = localStorage.getItem('agi_member_phone');
  if (phone) {
    const raw  = await API.getUserByPhone(phone);
    const user = App.parseUser(raw?.[0]);
    if (user) {
      currentPlayer = user;
      ownedCardIds  = new Set((user._raw.cards || []).map(c => c.id));
      updateWalletUI();
    }
  }

  if (!currentPlayer) {
    document.getElementById('login-gate').style.display = 'block';
  }

  await loadCatalogue();
});

// ── Load shop from __shop ─────────────────────────────────────
async function loadCatalogue() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = `<div class="shop-empty"><div class="shop-empty-icon">⏳</div><div class="shop-empty-text">Loading cards…</div></div>`;

  try {
    const res = await fetch(
      `${CONFIG.supabase.url}/rest/v1/${CONFIG.supabase.table}?id=eq.__shop&select=data`,
      { headers: { apikey: CONFIG.supabase.key, Authorization: `Bearer ${CONFIG.supabase.key}` } }
    );
    const json = await res.json();
    catalogue = Array.isArray(json?.[0]?.data) ? json[0].data : [];
  } catch (e) {
    console.error('Shop load error:', e);
    catalogue = [];
  }

  if (!catalogue.length) {
    grid.innerHTML = `<div class="shop-empty"><div class="shop-empty-icon">🃏</div><div class="shop-empty-text">No cards in the shop yet.<br>Ask an admin to add some!</div></div>`;
    updateSidebarCounts();
    return;
  }

  updateSidebarCounts();
  applyFilters();
}

// ── Sidebar counts ────────────────────────────────────────────
function updateSidebarCounts() {
  const rarities = ['C','R','SR','SSR'];
  const tiers = {};
  rarities.forEach(r => tiers[r] = 0);
  catalogue.forEach(c => { if (tiers[c.tier] !== undefined) tiers[c.tier]++; });

  document.getElementById('count-all').textContent = catalogue.length;
  rarities.forEach(r => {
    const el = document.getElementById('count-' + r);
    if (el) el.textContent = tiers[r];
  });

  const owned   = catalogue.filter(c => ownedCardIds.has(c.id)).length;
  const unowned = catalogue.length - owned;
  const el1 = document.getElementById('count-owned');
  const el2 = document.getElementById('count-unowned');
  if (el1) el1.textContent = owned;
  if (el2) el2.textContent = unowned;
}

function updateWalletUI() {
  if (!currentPlayer) return;
  document.getElementById('wallet-display').style.display = 'block';
  document.getElementById('wallet-coins').textContent = App.formatCoins(currentPlayer.coins);
  document.getElementById('wallet-name').textContent  = currentPlayer.name;
  document.getElementById('floating-wallet').style.display = 'flex';
  document.getElementById('fw-coins').textContent = App.formatCoins(currentPlayer.coins);
}

// ── Filters & render ─────────────────────────────────────────
function filterRarity(rarity, btn) {
  activeRarity = rarity;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q    = document.getElementById('search-input').value.toLowerCase().trim();
  const sort = document.getElementById('sort-select').value;

  let cards = [...catalogue];

  // Filter
  if (activeRarity === 'owned')        cards = cards.filter(c => ownedCardIds.has(c.id));
  else if (activeRarity === 'unowned') cards = cards.filter(c => !ownedCardIds.has(c.id));
  else if (activeRarity !== 'all')     cards = cards.filter(c => c.tier === activeRarity);

  // Search — name, seriesName, tier, badge
  if (q) cards = cards.filter(c =>
    (c.name || '').toLowerCase().includes(q) ||
    (c.seriesName || '').toLowerCase().includes(q) ||
    (c.badge || '').toLowerCase().includes(q) ||
    (c.tier || '').toLowerCase().includes(q)
  );

  // Sort
  if (sort === 'rarity')          cards.sort((a,b) => (TIER_ORDER[b.tier]??0) - (TIER_ORDER[a.tier]??0));
  else if (sort === 'price-asc')  cards.sort((a,b) => (a.price||a.worth||0) - (b.price||b.worth||0));
  else if (sort === 'price-desc') cards.sort((a,b) => (b.price||b.worth||0) - (a.price||a.worth||0));
  else if (sort === 'name')       cards.sort((a,b) => (a.name||'').localeCompare(b.name||''));

  renderGrid(cards);
}

function renderGrid(cards) {
  const grid = document.getElementById('cards-grid');
  if (!cards.length) {
    grid.innerHTML = `<div class="shop-empty"><div class="shop-empty-icon">🔍</div><div class="shop-empty-text">No cards match your filter.</div></div>`;
    return;
  }
  grid.innerHTML = cards.map(card => renderCardTile(card)).join('');
}

function renderCardTile(card) {
  const owned    = ownedCardIds.has(card.id);
  const color    = TIER_COLOR[card.tier] || 'var(--text-3)';
  const price    = card.price || card.worth || 0;
  const currency = card.currency || 'primos';
  const priceLabel = currency === 'pp'
    ? `◈ ${price.toLocaleString()} PP`
    : `🪙 ${App.formatCoins(price)}`;

  // Escalating visual weight by tier — common/uncommon barely stand out, mythic/legendary demand attention
  const tierWeight = { C:'low', Common:'low', R:'low', Uncommon:'low',
    Rare:'mid', SR:'mid', Epic:'mid',
    SSR:'high', Legendary:'high',
    UR:'top', Mythic:'top' };
  const weightClass = 'tier-' + (tierWeight[card.tier] || 'low');
  const tierLabel = (card.badge || card.tier || '').toString().toUpperCase();
  const labelText = weightClass === 'tier-top' ? `★ ${tierLabel} ★` : tierLabel;

  const canAfford = currentPlayer
    ? (currency === 'pp' ? currentPlayer.primePoints >= price : currentPlayer.coins >= price)
    : false;

  const actionHTML = owned
    ? `<div class="owned-label">✅ Owned</div>`
    : `<button class="buy-btn"
        ${!currentPlayer
          ? `onclick="window.location.href='member-login.html'"`
          : `onclick="openConfirm('${card.id}',event)"`}
        ${currentPlayer && !canAfford ? 'disabled title="Not enough balance"' : ''}
      >${!currentPlayer ? 'Log in' : canAfford ? 'Buy' : "Can't afford"}</button>`;

  // Use real artwork if available, else fallback art block — art itself is never overlaid or tinted
  const artHTML = card.preRenderedUrl
    ? `<img src="${card.preRenderedUrl}" alt="${card.name}"
           style="width:100%;height:100%;object-fit:contain;display:block;transition:transform 0.3s;"
           onerror="this.parentElement.innerHTML='<div class=\\"card-art-emoji\\">🃏</div>'">`
    : `<div class="card-art-emoji">🃏</div>`;

  const safeCardJson = JSON.stringify(JSON.stringify(card));
  return `
    <div class="shop-card ${weightClass} ${owned ? 'owned' : ''} fade-in" style="--tier-color:${color};"
      onclick="${owned ? `openCardModal(${safeCardJson})` : `openConfirm('${card.id}')`}">
      ${owned ? '<div class="owned-ribbon">OWNED</div>' : ''}
      <div class="tier-strip">${labelText}</div>
      <div class="card-art">
        ${artHTML}
      </div>
      <div class="card-body">
        <div class="card-name">${card.name || 'Unknown Card'}</div>
        ${card.seriesName ? `<div class="card-desc" style="margin-bottom:0.5rem;font-size:11px;">${card.seriesName}</div>` : ''}
        <div class="card-footer">
          <div class="card-price ${currency === 'pp' ? 'pp-price' : ''}">${priceLabel}</div>
          ${actionHTML}
        </div>
      </div>
    </div>
  `;
}

// ── Confirm modal ────────────────────────────────────────────
function openConfirm(cardId, e) {
  if (e) e.stopPropagation();
  if (!currentPlayer) { window.location.href = 'member-login.html'; return; }

  const card = catalogue.find(c => c.id === cardId);
  if (!card || ownedCardIds.has(card.id)) return;

  const color    = TIER_COLOR[card.tier] || 'var(--text-3)';
  const price    = card.price || card.worth || 0;
  const currency = card.currency || 'primos';
  const canAfford = currency === 'pp'
    ? currentPlayer.primePoints >= price
    : currentPlayer.coins >= price;

  confirmTarget = card;

  // Show real artwork or fallback emoji in modal
  const artEl = document.getElementById('confirm-art');
  if (card.preRenderedUrl) {
    artEl.innerHTML = `<img src="${card.preRenderedUrl}" alt="${card.name}"
      style="width:100%;height:220px;object-fit:cover;border-radius:var(--radius-lg) var(--radius-lg) 0 0;display:block;"
      onerror="this.outerHTML='<div style=\\"font-size:64px;text-align:center;padding:1rem;\\">🃏</div>'">`;
  } else {
    artEl.textContent = '🃏';
  }

  document.getElementById('confirm-name').textContent   = card.name || 'Unknown Card';
  document.getElementById('confirm-rarity').textContent = card.badge || card.tier;
  document.getElementById('confirm-rarity').style.color = color;
  document.getElementById('confirm-desc').textContent   = card.seriesName || '';

  const priceEl = document.getElementById('confirm-price-val');
  priceEl.className = 'confirm-price-val' + (currency === 'pp' ? ' pp' : '');
  priceEl.textContent = currency === 'pp'
    ? `◈ ${price.toLocaleString()} Prime Points`
    : `🪙 ${App.formatCoins(price)} Primos`;

  const buyBtn = document.getElementById('confirm-buy-btn');
  buyBtn.disabled    = !canAfford;
  buyBtn.textContent = canAfford
    ? 'Confirm purchase'
    : 'Not enough ' + (currency === 'pp' ? 'Prime Points' : 'Primos');

  document.getElementById('confirm-overlay').classList.add('open');
}

function closeConfirm(e) {
  if (e && e.target !== document.getElementById('confirm-overlay')) return;
  document.getElementById('confirm-overlay').classList.remove('open');
  confirmTarget = null;
}

async function confirmBuy() {
  if (!confirmTarget || !currentPlayer) return;

  const card    = confirmTarget;
  const price   = card.price || card.worth || 0;
  const currency = card.currency || 'primos';
  const buyBtn  = document.getElementById('confirm-buy-btn');
  buyBtn.disabled    = true;
  buyBtn.textContent = 'Buying…';

  // Build card entry matching the real schema
  const newCard = {
    id:             card.id,
    name:           card.name,
    tier:           card.tier,
    badge:          card.badge,
    worth:          card.worth || price,
    acquiredAt:     Date.now(),
    seriesName:     card.seriesName,
    preRenderedUrl: card.preRenderedUrl,
  };

  const rawData  = currentPlayer._raw;
  const newCards = [...(Array.isArray(rawData.cards) ? rawData.cards : []), newCard];
  const updates  = { cards: newCards };

  if (currency === 'pp') {
    updates.primePoints = Math.max(0, (Number(rawData.primePoints) || 0) - price);
  } else {
    updates.primos = Math.max(0, (Number(rawData.primos || rawData.coins || rawData.balance) || 0) - price);
  }

  const result = await API.updateUserData(currentPlayer._rowId, rawData, updates);

  if (!result) {
    App.showToast('Purchase failed — try again.', 'error');
    buyBtn.disabled    = false;
    buyBtn.textContent = 'Confirm purchase';
    return;
  }

  // Update local state
  ownedCardIds.add(card.id);
  currentPlayer._raw.cards = newCards;
  currentUser = currentPlayer; // keep ref in sync

  if (currency === 'pp') {
    currentPlayer.primePoints   = updates.primePoints;
    currentPlayer._raw.primePoints = updates.primePoints;
  } else {
    currentPlayer.coins        = updates.primos;
    currentPlayer._raw.primos  = updates.primos;
  }

  document.getElementById('confirm-overlay').classList.remove('open');
  confirmTarget = null;

  updateWalletUI();
  updateSidebarCounts();
  applyFilters();
  App.showToast(`🃏 ${card.name} added to your collection!`, 'success');
}

// ── Keyboard close ───────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('confirm-overlay').classList.remove('open');
});
</script>
